<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2ede8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: #2c241e;
        }

        /* main card – glassmorphism + clean */
        .card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 250, 245, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 56px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(40, 30, 20, 0.2), 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(235, 225, 215, 0.5);
            transition: all 0.2s;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 450;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            color: #2b211b;
            border-bottom: 2px solid #dacfc4;
            padding-bottom: 0.9rem;
            margin-bottom: 0.25rem;
        }

        h1 span {
            font-weight: 300;
            font-size: 1rem;
            background: #d2c3b6;
            color: #2b211b;
            padding: 0.2rem 1.2rem;
            border-radius: 60px;
            letter-spacing: 0.2px;
            opacity: 0.75;
        }

        .subhead {
            font-size: 1rem;
            font-weight: 350;
            color: #5f5146;
            margin-bottom: 2.2rem;
            padding-left: 4px;
            border-left: 4px solid #b8a59a;
            padding-left: 1rem;
            font-style: italic;
        }

        /* emotion grid — modern, icon + label */
        .emotion-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 10px;
            margin: 1.8rem 0 2.4rem;
        }

        .emotion-btn {
            background: rgba(245, 238, 232, 0.7);
            border: 1px solid #d6c8bc;
            padding: 0.65rem 1.5rem 0.65rem 1.3rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 470;
            color: #332a23;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            letter-spacing: 0.2px;
            line-height: 1.4;
        }

        .emotion-btn i {
            font-size: 1.2rem;
            width: 1.4rem;
            text-align: center;
            color: #5e4d3f;
            transition: color 0.2s;
        }

        .emotion-btn:hover {
            background: #e2d4ca;
            border-color: #b09b8d;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 18px -10px rgba(60, 40, 30, 0.12);
        }

        .emotion-btn:hover i {
            color: #3a2c23;
        }

        .emotion-btn:active {
            transform: scale(0.96);
        }

        .emotion-btn.active {
            background: #b09a8b;
            border-color: #8a7566;
            color: #fcf7f2;
            box-shadow: 0 6px 14px rgba(70, 50, 40, 0.15);
        }

        .emotion-btn.active i {
            color: #fcf7f2;
        }

        /* verse section */
        .verse-section {
            margin-top: 0.8rem;
        }

        .verse-list-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .verse-list-title {
            font-size: 1.25rem;
            font-weight: 400;
            color: #3f342c;
            border-left: 6px solid #b29b8d;
            padding-left: 1rem;
        }

        .more-btn {
            background: transparent;
            border: 1px solid #d2c0b3;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 450;
            color: #4d3e34;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(245, 238, 232, 0.3);
        }

        .more-btn i {
            font-size: 0.8rem;
        }

        .more-btn:hover {
            background: #dccfc4;
            border-color: #b09b8d;
            transform: scale(1.02);
        }

        .verse-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 270px;
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 1.8rem;
        }

        .verse-list::-webkit-scrollbar {
            width: 5px;
        }

        .verse-list::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }

        .verse-list::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }

        .verse-item {
            background: rgba(252, 247, 242, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.75rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #dccfc4;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }

        .verse-item:hover {
            background: #d6c7bb;
            border-color: #b09b8d;
            transform: translateX(6px);
            box-shadow: 0 8px 14px -10px rgba(50, 35, 25, 0.12);
        }

        .verse-item .ref {
            font-weight: 570;
            color: #4f3d31;
            min-width: 85px;
            font-size: 0.95rem;
        }

        .verse-item .preview {
            color: #3f332b;
            font-weight: 350;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.95rem;
        }

        /* bible display */
        .bible-display {
            background: #faf5ef;
            border-radius: 40px;
            padding: 2rem 2.2rem;
            border: 1px solid #dbcec2;
            box-shadow: inset 0 2px 10px rgba(235, 220, 208, 0.3);
            transition: all 0.2s;
            margin-top: 0.2rem;
        }

        .bible-display .verse-full {
            font-size: 1.3rem;
            line-height: 1.7;
            font-weight: 370;
            color: #281f1a;
        }

        .bible-display .verse-full strong {
            font-weight: 500;
            color: #6b5543;
            display: block;
            margin-top: 0.8rem;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        .empty-state {
            color: #8f7c6e;
            font-weight: 320;
            font-style: italic;
            text-align: center;
            padding: 0.8rem 0;
        }

        .footer-note {
            margin-top: 1.5rem;
            text-align: right;
            font-size: 0.85rem;
            color: #a08f80;
            border-top: 1px solid #dccfc4;
            padding-top: 1.2rem;
            letter-spacing: 0.2px;
        }

        .footer-note i {
            margin-right: 6px;
        }

        /* responsive */
        @media (max-width: 640px) {
            .card {
                padding: 1.8rem 1.2rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .emotion-btn {
                font-size: 0.9rem;
                padding: 0.5rem 1rem;
                gap: 6px;
            }
            .emotion-btn i {
                font-size: 1rem;
                width: 1.2rem;
            }
            .verse-item {
                flex-wrap: wrap;
                border-radius: 30px;
            }
            .verse-item .preview {
                white-space: normal;
            }
            .bible-display .verse-full {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

        <div class="footer-note"><i class="fas fa-feather"></i> New International Version · click any verse</div>

            const verseListEl = document.getElementById('verseList');
            const verseFullEl = document.getElementById('verseFull');
            const verseRefDisplay = document.getElementById('verseRefDisplay');
            const verseListTitle = document.getElementById('verseListTitle');
            const moreBtn = document.getElementById('moreVersesBtn');

            let currentEmotion = 'joy'; // default
            let currentVerses = []; // full array (all verses)
            let visibleCount = 5; // initial visible

            // helper: render verse list (with limit)
            function renderVerseList(emotionKey, limit = visibleCount) {
                const verses = bibleData[emotionKey];
                if (!verses || verses.length === 0) {
                    verseListEl.innerHTML = `<div class="empty-state"><i class="fas fa-ban"></i> no verses found</div>`;
                    return;
                }
                currentVerses = verses;
                const slice = verses.slice(0, limit);
                let html = '';
                slice.forEach((v) => {
                    const preview = v.text.length > 60 ? v.text.slice(0, 60) + '…' : v.text;
                    html += `
                            <div class="verse-item" data-ref="${v.ref}" data-text="${v.text.replace(/"/g, '&quot;')}">
                                <span class="ref">${v.ref}</span>
                                <span class="preview">${preview}</span>
                            </div>
                        `;
                });
                verseListEl.innerHTML = html;

                // attach click to each verse
                document.querySelectorAll('.verse-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const ref = this.dataset.ref;
                        const text = this.dataset.text;
                        if (ref && text) {
                            verseFullEl.innerHTML = `<span>${text}</span><strong>${ref}</strong>`;
                            verseRefDisplay.textContent = ref;
                        }
                    });
                });

                // auto-show first verse if exists
                const first = document.querySelector('.verse-item');
                if (first) first.click();
                else {
                    verseFullEl.innerHTML =
                        `<span style="color:#7f6d5e;"><i class="fas fa-book-open"></i> click a verse</span><strong id="verseRefDisplay"></strong>`;
                    verseRefDisplay.textContent = '';
                }

                // toggle more button visibility
                if (verses.length <= visibleCount) {
                    moreBtn.style.display = 'none';
                } else {
                    moreBtn.style.display = 'inline-flex';
                }
            }

            // "more verses" action: increase visible count by 3
            function loadMoreVerses() {
                if (!currentEmotion) return;
                const total = bibleData[currentEmotion]?.length || 0;
                visibleCount = Math.min(visibleCount + 3, total);
                renderVerseList(currentEmotion, visibleCount);
            }

            // set active emotion
            function setActiveEmotion(emotionKey) {
                currentEmotion = emotionKey;
                // update button active style
                emotionBtns.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.emotion === emotionKey) btn.classList.add('active');
                });

                // update title
                const names = {
                    joy: 'Joy',
                    sorrow: 'Sorrow',
                    anxiety: 'Anxiety',
                    gratitude: 'Gratitude',
                    hope: 'Hope',
                    love: 'Love',
                    peace: 'Peace',
                    strength: 'Strength',
                    forgiveness: 'Forgiveness',
                    guidance: 'Guidance',
                    faith: 'Faith',
                    comfort: 'Comfort'
                };
                verseListTitle.innerHTML =
                    `<i class="fas fa-bible" style="margin-right:8px;"></i>${names[emotionKey] || emotionKey} · verses`;

                // reset visible count
                visibleCount = 5;
                renderVerseList(emotionKey, visibleCount);
            }

            // emotion click listeners
            emotionBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const emotion = this.dataset.emotion;
                    if (emotion && bibleData[emotion]) {
                        setActiveEmotion(emotion);
                    } else {
                        verseListEl.innerHTML = `<div class="empty-state"><i class="fas fa-arrow-up"></i> select a feeling</div>`;
                        verseFullEl.innerHTML =
                            `<span style="color:#7f6d5e;"><i class="fas fa-book-open"></i> choose an emotion</span><strong id="verseRefDisplay"></strong>`;
                    }
                });
            });

            // more button
            moreBtn.addEventListener('click', loadMoreVerses);

            // default: joy
            window.addEventListener('load', function() {
                const defaultBtn = document.querySelector('.emotion-btn[data-emotion="joy"]');
                if (defaultBtn) {
                    defaultBtn.classList.add('active');
                    setActiveEmotion('joy');
                } else {
                    verseListEl.innerHTML = `<div class="empty-state"><i class="fas fa-arrow-up"></i> select a feeling</div>`;
                }
            });
        })();
    </script>
</body>
</html>
