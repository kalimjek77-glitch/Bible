<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Breezy · Emotional Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* === RESET & GLOBAL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #f2ede8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #2c241e;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .fullscreen {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 1.5rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            background: linear-gradient(160deg, #f7f2ec 0%, #e8e0d8 100%);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .fullscreen::-webkit-scrollbar {
            width: 4px;
        }
        .fullscreen::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .fullscreen::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .fullscreen {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }

        /* === HEADER === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(218, 207, 196, 0.4);
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 250, 245, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid #d6c8bc;
            border-radius: 60px;
            padding: 0.6rem 1.4rem 0.6rem 1.2rem;
            font-size: 1rem;
            font-weight: 470;
            color: #332a23;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            flex-shrink: 0;
        }

        .back-btn:active {
            transform: scale(0.94);
            background: #d6c7bb;
        }

        .back-btn i {
            font-size: 1.1rem;
            color: #5e4d3f;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-icons .icon-robot {
            font-size: 2rem;
            color: #6d8f7a;
        }

        .header-icons .icon-feather {
            font-size: 1.8rem;
            color: #8a7566;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #2b211b;
            white-space: nowrap;
        }

        .header h1 span {
            font-weight: 300;
            font-size: 0.7rem;
            background: rgba(210, 195, 182, 0.5);
            color: #2b211b;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            margin-left: 0.3rem;
        }

        .header-spacer {
            width: 80px;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .header {
                flex-wrap: nowrap;
                gap: 6px;
            }
            .back-btn {
                padding: 0.4rem 0.9rem 0.4rem 0.7rem;
                font-size: 0.8rem;
            }
            .back-btn i {
                font-size: 0.85rem;
            }
            .back-btn span {
                display: none;
            }
            .header-icons .icon-robot {
                font-size: 1.5rem;
            }
            .header-icons .icon-feather {
                font-size: 1.3rem;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .header h1 span {
                font-size: 0.55rem;
                padding: 0.05rem 0.5rem;
            }
            .header-spacer {
                width: 30px;
            }
        }

        @media (max-width: 380px) {
            .back-btn {
                padding: 0.3rem 0.6rem;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .header-icons .icon-robot {
                font-size: 1.2rem;
            }
            .header-icons .icon-feather {
                font-size: 1rem;
            }
            .header-spacer {
                width: 20px;
            }
        }

        @media (min-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .header-icons .icon-robot {
                font-size: 2.4rem;
            }
            .header-icons .icon-feather {
                font-size: 2.2rem;
            }
        }

        .subtitle {
            color: #5f5146;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            opacity: 0.8;
            padding: 0 0.5rem;
        }

        /* === CHAT AREA === */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 1rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem 0.5rem 0.8rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 300px;
            max-height: 600px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .chat-messages {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }

        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 92%;
        }

        .message-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-wrapper.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(176, 154, 139, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1.5px solid rgba(214, 200, 188, 0.5);
        }

        .avatar i {
            font-size: 1.2rem;
            color: #3f342c;
        }

        .message-wrapper.user .avatar {
            background: rgba(109, 143, 122, 0.3);
            border-color: rgba(109, 143, 122, 0.3);
        }

        .message-wrapper.user .avatar i {
            color: #4a6b5c;
        }

        .message {
            padding: 1rem 1.4rem;
            border-radius: 24px;
            font-size: 1.05rem;
            line-height: 1.7;
            word-wrap: break-word;
            animation: msgFadeIn 0.35s ease forwards;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            flex: 1;
        }

        @keyframes msgFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.user .message {
            align-self: flex-end;
            background: rgba(176, 154, 139, 0.35);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(176, 154, 139, 0.25);
            color: #2b211b;
            border-bottom-right-radius: 6px;
        }

        .message-wrapper.bot .message {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            color: #281f1a;
            border-bottom-left-radius: 6px;
        }

        .message .msg-meta {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-wrapper.bot .msg-meta {
            color: #5f5146;
        }

        .message-wrapper.user .msg-meta {
            color: #5f5146;
            justify-content: flex-end;
        }

        .typing-indicator {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            padding: 0.8rem 1.4rem;
            display: none;
            gap: 6px;
            align-items: center;
            margin-left: 48px;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #8a7566;
            border-radius: 50%;
            animation: typingDot 1.2s ease-in-out infinite;
        }

        .typing-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingDot {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-top: 0.8rem;
            border-top: 2px solid rgba(218, 207, 196, 0.3);
            flex-shrink: 0;
            margin-top: 0.2rem;
            flex-wrap: wrap;
        }

        .input-area input {
            flex: 1;
            min-width: 160px;
            padding: 0.9rem 1.4rem;
            border: 2px solid rgba(214, 200, 188, 0.5);
            border-radius: 60px;
            font-size: 1.05rem;
            font-family: inherit;
            color: #2b211b;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-area input:focus {
            border-color: #b09a8b;
            box-shadow: 0 0 0 4px rgba(176, 154, 139, 0.15);
        }

        .input-area input::placeholder {
            color: #8f7c6e;
            font-style: italic;
            opacity: 0.7;
        }

        .input-area .send-btn {
            background: rgba(176, 154, 139, 0.5);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(138, 117, 102, 0.3);
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 470;
            color: #fcf7f2;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .input-area .send-btn:active {
            transform: scale(0.94);
            background: rgba(138, 117, 102, 0.6);
        }

        .input-area .send-btn i {
            font-size: 1.1rem;
        }

        .footer {
            flex-shrink: 0;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(160, 143, 128, 0.6);
            padding-top: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(220, 207, 196, 0.2);
        }

        .footer i {
            margin: 0 3px;
        }

        @media (max-width: 400px) {
            .fullscreen {
                padding: 1rem 0.8rem 1.5rem;
            }
            .message {
                font-size: 0.92rem;
                padding: 0.8rem 1rem;
            }
            .message-wrapper {
                max-width: 96%;
            }
            .input-area input {
                font-size: 0.92rem;
                padding: 0.7rem 1.2rem;
                min-width: 120px;
            }
            .input-area .send-btn {
                font-size: 0.9rem;
                padding: 0.7rem 1.2rem;
            }
            .chat-messages {
                max-height: 400px;
                min-height: 200px;
                padding: 0.4rem 0.2rem;
            }
            .subtitle {
                font-size: 0.8rem;
                margin-bottom: 0.8rem;
            }
            .avatar {
                width: 30px;
                height: 30px;
            }
            .avatar i {
                font-size: 0.9rem;
            }
            .typing-indicator {
                margin-left: 40px;
            }
        }

        @media (min-width: 600px) {
            .chat-messages {
                max-height: 700px;
                min-height: 400px;
            }
            .message-wrapper {
                max-width: 82%;
            }
            .message {
                font-size: 1.15rem;
                padding: 1.2rem 1.8rem;
            }
            .input-area input {
                font-size: 1.15rem;
                padding: 1rem 1.8rem;
            }
            .input-area .send-btn {
                font-size: 1.15rem;
                padding: 1rem 2.2rem;
            }
            .subtitle {
                font-size: 1.05rem;
            }
        }

        @media (min-width: 900px) {
            .fullscreen {
                padding: 2.5rem 4rem 3rem;
                max-width: 1100px;
                margin: 0 auto;
            }
            .chat-messages {
                max-height: 800px;
                min-height: 450px;
            }
            .message-wrapper {
                max-width: 75%;
            }
            .message {
                font-size: 1.2rem;
            }
        }

        .chat-messages {
            scroll-behavior: smooth;
        }

        .message-wrapper.bot .message .heart-icon {
            color: #c47a7a;
            margin-right: 4px;
        }
    </style>
</head>
<body>

    <div class="fullscreen" id="app">

        <!-- Header -->
        <div class="header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i> <span>Back</span>
            </button>
            <div class="header-center">
                <div class="header-icons">
                    <i class="fas fa-robot icon-robot"></i>
                    <i class="fas fa-feather-alt icon-feather"></i>
                </div>
                <h1>Breezy <span>AI</span></h1>
            </div>
            <div class="header-spacer"></div>
        </div>

        <div class="subtitle">Tell me how you feel — I'm here to listen and encourage you ❤️</div>

        <!-- Chat -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>

            <div class="typing-indicator" id="typingIndicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Share your feelings, or just say what's on your mind…" autocomplete="off" />
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i> Ask</button>
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-robot"></i> Breezy · Listening with love <i class="fas fa-feather-alt"></i>
        </div>
    </div>

    <script>
        // ============================================================
        // COMPLETE FEELINGS DATABASE — every emotion with advice & verses
        // ============================================================

        const feelingsData = {

            // ----- SADNESS & GRIEF -----
            sad: {
                keywords: ['sad', 'sorrow', 'grief', 'mourn', 'cry', 'weep', 'depressed', 'down', 'brokenhearted',
                    'heartbroken', 'grieving', 'blue', 'melancholy', 'despondent', 'tears'
                ],
                responses: [{
                    advice: "I'm sorry you're feeling so sad. It's okay to let the tears flow — they water the seeds of healing. God sees every tear and holds them in His bottle. You are not forgotten, and this sadness will not last forever. Let yourself rest in His comfort.",
                    verse: "Psalm 34:18 — 'The Lord is near to the brokenhearted and saves those who are crushed in spirit.'"
                }, {
                    advice: "Sadness can feel like a heavy blanket, but you are not alone in this. God is close to the brokenhearted, and He promises to bind up your wounds. Take a slow breath, and know that you are deeply loved even in this valley.",
                    verse: "Psalm 147:3 — 'He heals the brokenhearted and binds up their wounds.'"
                }, {
                    advice: "It's hard to carry sadness, but remember that even Jesus wept. Your tears are precious to God. He doesn't ask you to be strong on your own — He offers you His strength. Let Him hold you today.",
                    verse: "John 11:35 — 'Jesus wept.' (He understands your sorrow.)"
                }, {
                    advice: "Grief is a journey, not a destination. Give yourself permission to feel it all. God is with you in every step, and He will carry you through the darkest valleys.",
                    verse: "Psalm 23:4 — 'Even though I walk through the darkest valley, I will fear no evil, for you are with me; your rod and your staff, they comfort me.'"
                }]
            },

            // ----- ANXIETY & WORRY -----
            anxious: {
                keywords: ['anxious', 'anxiety', 'worried', 'worry', 'stress', 'overwhelmed', 'panic', 'fearful',
                    'afraid', 'scared', 'nervous', 'troubled', 'dread', 'uneasy', 'fret', 'jittery'
                ],
                responses: [{
                    advice: "I hear your anxiety — it's like a storm inside. But the God of peace is greater than any storm. He promises to guard your heart and mind with a peace that doesn't make sense in the middle of chaos. Cast your worries on Him, one by one.",
                    verse: "Philippians 4:6-7 — 'Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God. And the peace of God, which transcends all understanding, will guard your hearts and your minds in Christ Jesus.'"
                }, {
                    advice: "Your worries are real, but they are not the final word. God holds tomorrow, and He holds you. Try to hand Him one worry at a time — He can carry it all. You are not alone in this fight.",
                    verse: "1 Peter 5:7 — 'Cast all your anxiety on him because he cares for you.'"
                }, {
                    advice: "When anxiety whispers 'what if,' let faith whisper 'even if.' Even if everything falls apart, God is still with you. He has not given you a spirit of fear, but of power, love, and a sound mind.",
                    verse: "2 Timothy 1:7 — 'For God has not given us a spirit of fear, but of power and of love and of a sound mind.'"
                }, {
                    advice: "Take a deep breath. You don't have to solve everything today. God is with you in this moment, and He will give you the strength for each step as it comes.",
                    verse: "Matthew 6:34 — 'Therefore do not worry about tomorrow, for tomorrow will worry about itself. Each day has enough trouble of its own.'"
                }]
            },

            // ----- ANGER & FRUSTRATION -----
            angry: {
                keywords: ['angry', 'anger', 'furious', 'rage', 'frustrated', 'bitter', 'resentful', 'irritated',
                    'annoyed', 'wrath', 'mad', 'outraged', 'enraged', 'fuming'
                ],
                responses: [{
                    advice: "I feel your anger, and it's a powerful emotion. Anger can be a signal that something important is at stake. But don't let it control you — pause, breathe, and give your anger to God. He can handle it, and He can help you respond with wisdom.",
                    verse: "Ephesians 4:26-27 — 'In your anger do not sin: Do not let the sun go down while you are still angry, and do not give the devil a foothold.'"
                }, {
                    advice: "It's okay to be angry, but don't let it take root in your heart. God understands your frustration, and He invites you to bring it to Him. Speak to Him honestly, and let His peace quiet your storm.",
                    verse: "Psalm 37:8 — 'Refrain from anger and turn from wrath; do not fret—it leads only to evil.'"
                }, {
                    advice: "Anger can be like fire — useful when controlled, destructive when wild. Ask God to help you channel your anger into something good: justice, change, or even just a deep breath. He is patient with you.",
                    verse: "James 1:19-20 — 'Everyone should be quick to listen, slow to speak and slow to become angry, because human anger does not produce the righteousness that God desires.'"
                }, {
                    advice: "Your anger is valid, but it doesn't have to own you. Take a step back, breathe, and ask God to give you His perspective. He sees the bigger picture.",
                    verse: "Proverbs 15:1 — 'A gentle answer turns away wrath, but a harsh word stirs up anger.'"
                }]
            },

            // ----- FEAR -----
            fear: {
                keywords: ['fear', 'terrified', 'scared', 'afraid', 'phobia', 'dread', 'frightened', 'panicked', 'horror',
                    'trembling', 'petrified'
                ],
                responses: [{
                    advice: "Fear can be paralyzing, but you don't have to face it alone. God says, 'Fear not, for I am with you.' He is holding your hand, and He won't let you go. Take a small step forward — He will meet you there.",
                    verse: "Isaiah 41:10 — 'So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.'"
                }, {
                    advice: "Your fear is valid, but it doesn't have to have the last word. God has given you a spirit not of fear but of power. Speak to your fear and tell it that God is bigger.",
                    verse: "Joshua 1:9 — 'Have I not commanded you? Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.'"
                }, {
                    advice: "When you feel afraid, remember that you are in the palm of God's hand. Nothing can snatch you away. Let that truth settle in your heart, and let His perfect love drive out your fear.",
                    verse: "1 John 4:18 — 'There is no fear in love. But perfect love drives out fear.'"
                }, {
                    advice: "Fear is a liar. God is with you, and He is greater than anything you face. Take courage — He has already won the victory.",
                    verse: "Psalm 27:1 — 'The Lord is my light and my salvation— whom shall I fear? The Lord is the stronghold of my life— of whom shall I be afraid?'"
                }]
            },

            // ----- LONELINESS -----
            lonely: {
                keywords: ['lonely', 'loneliness', 'alone', 'isolated', 'abandoned', 'forsaken', 'unwanted', 'rejected',
                    'left out', 'desolate', 'neglected', 'solitary'
                ],
                responses: [{
                    advice: "Loneliness can feel like a desert, but you are never truly alone. God promises never to leave you or forsake you. He is with you in the silence, and He sees your heart. You are deeply loved and valued.",
                    verse: "Deuteronomy 31:8 — 'The Lord himself goes before you and will be with you; he will never leave you nor forsake you. Do not be afraid; do not be discouraged.'"
                }, {
                    advice: "Even when everyone else seems far away, God is closer than your breath. He knows your name, and He calls you His own. You are not invisible to Him — you are precious in His sight.",
                    verse: "Isaiah 43:1 — 'Do not fear, for I have redeemed you; I have summoned you by name; you are mine.'"
                }, {
                    advice: "Loneliness is a heavy weight, but it can also be a time to draw closer to God. He is the friend who sticks closer than a brother. Talk to Him, pour out your heart, and let His presence fill the empty spaces.",
                    verse: "Psalm 25:16 — 'Turn to me and be gracious to me, for I am lonely and afflicted.'"
                }, {
                    advice: "You are never unwanted. God created you with purpose and love. Even in the quiet moments, He is there, and He delights in you.",
                    verse: "Psalm 68:6 — 'God sets the lonely in families, he leads out the prisoners with singing.'"
                }]
            },

            // ----- JOY & HAPPINESS -----
            joyful: {
                keywords: ['joy', 'happy', 'joyful', 'glad', 'delight', 'cheerful', 'blessed', 'excited', 'elated',
                    'ecstatic', 'thrilled', 'overjoyed'
                ],
                responses: [{

                    verse: "Proverbs 15:1 — 'A gentle answer turns away wrath, but a harsh word stirs up anger.'"
                }, {
                    advice: "You don't have to hide your frustration — bring it to God. He can handle your rawest emotions. And He can help you find words that bring life instead of hurt.",
                    verse: "Psalm 141:3 — 'Set a guard over my mouth, Lord; keep watch over the door of my lips.'"
                }, {
                    advice: "It's okay to be angry or frustrated. But let God help you speak with grace. Your words can either build up or tear down — and He wants to use you to build.",
                    verse: "Colossians 4:6 — 'Let your conversation be always full of grace, seasoned with salt, so that you may know how to answer everyone.'"
                }]
            },

            // ----- GREED / MATERIALISM -----
            greedy: {
                keywords: ['greedy', 'greed', 'materialism', 'money', 'wealth', 'possessions', 'covetous', 'hoarding',
                    'want more'
                ],
                responses: [{
                    advice: "It's easy to get caught up in wanting more — more money, more things, more status. But true contentment comes from knowing that God is enough. He has given you everything you need for today.",
                    verse: "1 Timothy 6:6-7 — 'But godliness with contentment is great gain. For we brought nothing into the world, and we can take nothing out of it.'"
                }, {
                    advice: "Your worth is not measured by what you own. God sees your heart, not your bank account. Ask Him to fill you with a sense of purpose that money can't buy.",
                    verse: "Luke 12:15 — 'Watch out! Be on your guard against all kinds of greed; life does not consist in an abundance of possessions.'"
                }, {
                    advice: "The things of this world are temporary, but God's love is eternal. Invest your heart in what lasts forever — relationships, kindness, and faith.",
                    verse: "Matthew 6:19-20 — 'Do not store up for yourselves treasures on earth... But store up for yourselves treasures in heaven.'"
                }]
            },

            // ----- JEALOUSY (already covered above, but adding more) -----
            // ----- ADDICTION / RELIANCE -----
            addicted: {
                keywords: ['addict', 'addiction', 'dependent', 'craving', 'can\'t stop', 'obsessed', 'hooked',
                    'substance', 'alcohol', 'drugs'
                ],
                responses: [{
                    advice: "Addiction can feel like a prison, but there is freedom in Christ. You are not defined by your struggle. God sees you, and He wants to set you free. Seek help, and know that His grace is greater than any addiction.",
                    verse: "2 Corinthians 5:17 — 'Therefore, if anyone is in Christ, the new creation has come: The old has gone, the new is here!'"
                }, {
                    advice: "You are not alone in this fight. God is with you, and He can break every chain. Reach out to someone you trust, and let God's strength carry you through.",
                    verse: "Romans 6:14 — 'For sin shall no longer be your master, because you are not under the law, but under grace.'"
                }, {
                    advice: "Freedom is possible. One step at a time, with God's help, you can overcome. He has not given up on you, and He never will.",
                    verse: "John 8:36 — 'So if the Son sets you free, you will be free indeed.'"
                }]
            }
        };

        // ============================================================
        // CHAT LOGIC
        // ============================================================

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.focus();

            typingIndicator.classList.add('show');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            setTimeout(() => {
                const reply = generateReply(text);
                typingIndicator.classList.remove('show');
                addMessage('bot', reply);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 400 + Math.random() * 300);
        }

        function addMessage(type, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            if (type === 'bot') {
                avatar.innerHTML = '<i class="fas fa-robot"></i>';
            } else {
                avatar.innerHTML = '<i class="fas fa-user"></i>';
            }
            wrapper.appendChild(avatar);

            const bubble = document.createElement('div');
            bubble.className = 'message';

            const textSpan = document.createElement('div');
            textSpan.textContent = text;
            bubble.appendChild(textSpan);

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (type === 'bot') {
                meta.innerHTML = `Breezy · ${timeStr}`;
            } else {
                meta.innerHTML = `${timeStr} · You`;
            }
            bubble.appendChild(meta);

            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ============================================================
        // GENERATE REPLY — ONLY FEELINGS
        // ============================================================

        function generateReply(query) {
            const lower = query.toLowerCase().trim();

            // 1) DETECT FEELING
            let detectedEmotion = null;
            let bestScore = 0;

            for (const [key, emotion] of Object.entries(feelingsData)) {
                let score = 0;
                for (const kw of emotion.keywords) {
                    if (lower.includes(kw)) {
                        const regex = new RegExp('\\b' + kw + '\\b', 'i');
                        if (regex.test(lower)) {
                            score += 12;
                        } else if (lower.includes(kw)) {
                            score += 6;
                        }
                    }
                }
                // Check "I feel", "feeling", "so", "very" patterns
                for (const kw of emotion.keywords) {
                    const patterns = ['feel ' + kw, 'feeling ' + kw, 'felt ' + kw, 'am ' + kw, 'so ' + kw, 'very ' + kw,
                        'feel like ' + kw, 'feeling like ' + kw
                    ];
                    for (const p of patterns) {
                        if (lower.includes(p)) {
                            score += 20;
                        }
                    }
                }
                if (score > bestScore) {
                    bestScore = score;
                    detectedEmotion = key;
                }
            }

            // If we have a strong detection (score >= 4), give emotional response
            if (detectedEmotion && bestScore >= 4) {
                const emotion = feelingsData[detectedEmotion];
                const responses = emotion.responses;
                const randomIndex = Math.floor(Math.random() * responses.length);
                const chosen = responses[randomIndex];

                const emojiMap = {
                    sad: '😢',
                    anxious: '😰',
                    angry: '😤',
                    fear: '😨',
                    lonely: '😔',
                    joyful: '😊',
                    discouraged: '😞',
                    guilty: '😣',
                    loved: '🥰',
                    confused: '🤔',
                    betrayed: '💔',
                    hatred: '🤬',
                    peaceful: '😌',
                    gratitude: '🙏',
                    bored: '😑',
                    suicidal: '💔',
                    stressed: '😩',
                    insecure: '😥',
                    notokay: '🫂',
                    jealous: '😒',
                    pride: '😏',
                    hopeful: '🌟',
                    idontknow: '🤷',
                    mocking: '😕',
                    greedy: '💰',
                    addicted: '🔄'
                };
                const emoji = emojiMap[detectedEmotion] || '❤️';

                let response =
                    `${emoji} I hear that you're feeling **${detectedEmotion}**.\n\n${chosen.advice}\n\n📖 ${chosen.verse}`;
                const closings = [
                    "You are loved, and you are never alone. 🙏",
                    "God is with you, and He will never let you go. 🌟",
                    "Hold on — hope is on the way. 💪",
                    "You are precious in His sight. Let that sink in. 💖",
                    "Take a deep breath. He's got this. 🕊️",
                    "Don't give up — God is fighting for you. ⚔️",
                    "You are stronger than you think, because He is with you. 💪",
                    "Rest in His love today. ❤️"
                ];
                response += `\n\n${closings[Math.floor(Math.random() * closings.length)]}`;
                return response;
            }

            // 2) Check for general "not okay" or "I don't know" even without strong keyword match
            if (/not okay|not fine|struggling|falling apart|losing it|can't cope|i don't know what to do|i need help|i'm lost|i'm broken|i'm empty|i'm tired|i'm exhausted|i give up|i can't do this|help me/i
                .test(lower)) {
                const responses = feelingsData.notokay.responses;
                const chosen = responses[Math.floor(Math.random() * responses.length)];
                return `🫂 I'm here for you. ${chosen.advice}\n\n📖 ${chosen.verse}\n\nYou are not alone. 🙏`;
            }

            // 3) If user is asking about something else, gently guide back to feelings
            if (/what is|who is|tell me about|explain|define|what does|what are|what's|how many/i.test(lower)) {
                return "I'm here to listen to your heart, not just to give information. 😊 Tell me how you're feeling — sad, anxious, angry, lonely, joyful, or anything else — and I'll share encouragement and a Bible verse just for you. What's on your heart today? ❤️";
            }

            // 4) Quick greeting
            if (/^(hi|hello|hey|greetings|good morning|good afternoon|good evening|howdy|sup|yo)/i.test(lower) && lower
                .length < 30) {
                return "Hello! I'm Breezy 🤖❤️. I'm here to listen to your heart. Tell me how you're feeling — sad, anxious, angry, lonely, joyful, bored, stressed, or anything else — and I'll share encouragement and a Bible verse just for you. What's on your mind today?";
            }

            // 5) Thanks
            if (/thank|thanks|appreciate|grateful/i.test(lower)) {
                const thanks = [
                    "You're so welcome! ❤️ I'm glad I could encourage you. If you ever need to talk again, I'll be right here. God bless you! 🙏",
                    "It's my joy to help! Remember, God is always with you. 🌟",
                    "I'm here anytime you need a listening ear. You are loved! 💖"
                ];
                return thanks[Math.floor(Math.random() * thanks.length)];
            }

            // 6) If the user asks for encouragement directly
            if (/encourage|motivate|uplift|give me hope|need strength|need peace|need joy|lift me up|cheer me up|give me a word/i
                .test(lower)) {
                const encouragements = [
                    "🌟 You are stronger than you think, because God's strength is made perfect in weakness.\n\n📖 **Philippians 4:13** — 'I can do all this through him who gives me strength.'\n\nKeep going — God is with you every step of the way. 🙏",
                    "💪 You are not alone in this fight. God is your refuge and strength.\n\n📖 **Isaiah 41:10** — 'So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.'",
                    "🌅 Hope is not lost. God has plans to prosper you and give you a future.\n\n📖 **Jeremiah 29:11** — 'For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.'",
                    "🕊️ Peace I leave with you. Not as the world gives, but as Christ gives.\n\n📖 **John 14:27** — 'Peace I leave with you; my peace I give you. Do not let your hearts be troubled and do not be afraid.'"
                ];
                return encouragements[Math.floor(Math.random() * encouragements.length)];
            }

            // 7) If user asks "How are you?" or "What do you do?"
            if (/how are you|what do you do|who are you|tell me about yourself/i.test(lower)) {
                return "I'm Breezy 🤖❤️ — your emotional support companion. My only purpose is to listen to your heart and help you find hope and encouragement in God's Word. Tell me how you're feeling, and I'll share a verse and advice just for you. That's all I'm here for — to be a friend who listens. 💕";
            }

            // 8) If no feeling detected at all
            return "I'm here to listen to your heart. ❤️ Tell me how you're feeling — sad, anxious, angry, lonely, joyful, bored, stressed, confused, or anything else — and I'll share encouragement and a Bible verse just for you. What's on your mind today? 🙏";
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // ============================================================
        // WELCOME MESSAGE
        // ============================================================

        function showWelcome() {
            const welcomeText =
                "Hi, I'm Breezy 🤖❤️. I'm here to listen to your heart — no matter what you're feeling.\n\nJust tell me what's on your mind: sadness, anger, joy, boredom, stress, confusion, fear, loneliness, or anything else. I'll share encouragement and a Bible verse to help you through.\n\nYou don't have to be okay. I'm here for you. What's going on today?";

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';
            wrapper.appendChild(avatar);

            const bubble = document.createElement('div');
            bubble.className = 'message';

            const textSpan = document.createElement('div');
            textSpan.textContent = welcomeText;
            bubble.appendChild(textSpan);

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.innerHTML = `Breezy · now`;
            bubble.appendChild(meta);

            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
        }

        // ============================================================
        // INIT
        // ============================================================

        showWelcome();
        userInput.focus();

        console.log('❤️ Breezy Emotional Support loaded!');
        console.log('😊 Emotions covered:', Object.keys(feelingsData).length);
    </script>
</body>
</html>
