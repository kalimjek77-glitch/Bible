<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bible Chat · Ask Me Anything</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* === RESET & GLOBAL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #f2ede8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #2c241e;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === FULL PAGE — SCROLLABLE === */
        .fullscreen {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 1.5rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            background: linear-gradient(160deg, #f7f2ec 0%, #e8e0d8 100%);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .fullscreen::-webkit-scrollbar {
            width: 4px;
        }
        .fullscreen::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .fullscreen::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .fullscreen {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }

        /* === HEADER with Back + Logo === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(218, 207, 196, 0.4);
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 250, 245, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid #d6c8bc;
            border-radius: 60px;
            padding: 0.6rem 1.4rem 0.6rem 1.2rem;
            font-size: 1rem;
            font-weight: 470;
            color: #332a23;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            flex-shrink: 0;
        }

        .back-btn:active {
            transform: scale(0.94);
            background: #d6c7bb;
        }

        .back-btn i {
            font-size: 1.1rem;
            color: #5e4d3f;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-icons .icon-robot {
            font-size: 2rem;
            color: #6d8f7a;
        }

        .header-icons .icon-feather {
            font-size: 1.8rem;
            color: #8a7566;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #2b211b;
            white-space: nowrap;
        }

        .header h1 span {
            font-weight: 300;
            font-size: 0.7rem;
            background: rgba(210, 195, 182, 0.5);
            color: #2b211b;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            margin-left: 0.3rem;
        }

        .header-spacer {
            width: 80px;
            flex-shrink: 0;
        }

        /* responsive header */
        @media (max-width: 480px) {
            .header {
                flex-wrap: nowrap;
                gap: 6px;
            }
            .back-btn {
                padding: 0.4rem 0.9rem 0.4rem 0.7rem;
                font-size: 0.8rem;
            }
            .back-btn i {
                font-size: 0.85rem;
            }
            .back-btn span {
                display: none;
            }
            .header-icons .icon-robot {
                font-size: 1.5rem;
            }
            .header-icons .icon-feather {
                font-size: 1.3rem;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .header h1 span {
                font-size: 0.55rem;
                padding: 0.05rem 0.5rem;
            }
            .header-spacer {
                width: 30px;
            }
        }

        @media (max-width: 380px) {
            .back-btn {
                padding: 0.3rem 0.6rem;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .header-icons .icon-robot {
                font-size: 1.2rem;
            }
            .header-icons .icon-feather {
                font-size: 1rem;
            }
            .header-spacer {
                width: 20px;
            }
        }

        @media (min-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .header-icons .icon-robot {
                font-size: 2.4rem;
            }
            .header-icons .icon-feather {
                font-size: 2.2rem;
            }
        }

        /* === SUBTITLE === */
        .subtitle {
            color: #5f5146;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            opacity: 0.8;
            padding: 0 0.5rem;
        }

        /* === CHAT AREA === */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 1rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem 0.5rem 0.8rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 300px;
            max-height: 600px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .chat-messages {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }

        /* message bubbles */
        .message {
            max-width: 88%;
            padding: 1rem 1.4rem;
            border-radius: 24px;
            font-size: 1.05rem;
            line-height: 1.7;
            word-wrap: break-word;
            animation: msgFadeIn 0.35s ease forwards;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        @keyframes msgFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: rgba(176, 154, 139, 0.35);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(176, 154, 139, 0.25);
            color: #2b211b;
            border-bottom-right-radius: 6px;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            color: #281f1a;
            border-bottom-left-radius: 6px;
        }

        .message .msg-meta {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.bot .msg-meta {
            color: #5f5146;
        }

        .message.user .msg-meta {
            color: #5f5146;
            justify-content: flex-end;
        }

        /* typing indicator */
        .typing-indicator {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            padding: 0.8rem 1.4rem;
            display: none;
            gap: 6px;
            align-items: center;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #8a7566;
            border-radius: 50%;
            animation: typingDot 1.2s ease-in-out infinite;
        }

        .typing-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingDot {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* === INPUT AREA === */
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-top: 0.8rem;
            border-top: 2px solid rgba(218, 207, 196, 0.3);
            flex-shrink: 0;
            margin-top: 0.2rem;
            flex-wrap: wrap;
        }

        .input-area input {
            flex: 1;
            min-width: 160px;
            padding: 0.9rem 1.4rem;
            border: 2px solid rgba(214, 200, 188, 0.5);
            border-radius: 60px;
            font-size: 1.05rem;
            font-family: inherit;
            color: #2b211b;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-area input:focus {
            border-color: #b09a8b;
            box-shadow: 0 0 0 4px rgba(176, 154, 139, 0.15);
        }

        .input-area input::placeholder {
            color: #8f7c6e;
            font-style: italic;
            opacity: 0.7;
        }

        .input-area .send-btn {
            background: rgba(176, 154, 139, 0.5);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(138, 117, 102, 0.3);
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 470;
            color: #fcf7f2;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .input-area .send-btn:active {
            transform: scale(0.94);
            background: rgba(138, 117, 102, 0.6);
        }

        .input-area .send-btn i {
            font-size: 1.1rem;
        }

        /* === FOOTER === */
        .footer {
            flex-shrink: 0;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(160, 143, 128, 0.6);
            padding-top: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(220, 207, 196, 0.2);
        }

        .footer i {
            margin: 0 3px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 400px) {
            .fullscreen {
                padding: 1rem 0.8rem 1.5rem;
            }
            .message {
                font-size: 0.92rem;
                padding: 0.8rem 1rem;
                max-width: 92%;
            }
            .input-area input {
                font-size: 0.92rem;
                padding: 0.7rem 1.2rem;
                min-width: 120px;
            }
            .input-area .send-btn {
                font-size: 0.9rem;
                padding: 0.7rem 1.2rem;
            }
            .chat-messages {
                max-height: 400px;
                min-height: 200px;
                padding: 0.4rem 0.2rem;
            }
            .subtitle {
                font-size: 0.8rem;
                margin-bottom: 0.8rem;
            }
        }

        @media (min-width: 600px) {
            .chat-messages {
                max-height: 700px;
                min-height: 400px;
            }
            .message {
                max-width: 78%;
                font-size: 1.15rem;
                padding: 1.2rem 1.8rem;
            }
            .input-area input {
                font-size: 1.15rem;
                padding: 1rem 1.8rem;
            }
            .input-area .send-btn {
                font-size: 1.15rem;
                padding: 1rem 2.2rem;
            }
            .subtitle {
                font-size: 1.05rem;
            }
        }

        @media (min-width: 900px) {
            .fullscreen {
                padding: 2.5rem 4rem 3rem;
                max-width: 1100px;
                margin: 0 auto;
            }
            .chat-messages {
                max-height: 800px;
                min-height: 450px;
            }
            .message {
                max-width: 70%;
                font-size: 1.2rem;
            }
        }

        /* welcome message special */
        .welcome-msg .msg-meta {
            color: #8a7566;
        }

        .welcome-msg i {
            color: #6d8f7a;
            margin-right: 4px;
        }

        /* scrollable message area smooth */
        .chat-messages {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <div class="fullscreen" id="app">

        <!-- Header -->
        <div class="header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i> <span>Back</span>
            </button>
            <div class="header-center">
                <div class="header-icons">
                    <i class="fas fa-robot icon-robot"></i>
                    <i class="fas fa-feather-alt icon-feather"></i>
                </div>
                <h1>Bible Chat <span>AI</span></h1>
            </div>
            <div class="header-spacer"></div>
        </div>

        <div class="subtitle">Ask anything about the Bible — Genesis to Revelation</div>

        <!-- Chat -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <!-- messages will be inserted here -->
            </div>

            <!-- typing indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <!-- Input -->
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask about any Bible book, character, or event…" autocomplete="off" />
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i> Ask</button>
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-robot"></i> Powered by Bible Knowledge · NIV <i class="fas fa-feather-alt"></i>
        </div>
    </div>

    <script>
        // ============================================================
        // BIBLE KNOWLEDGE BASE — comprehensive from Genesis to Revelation
        // ============================================================

        const bibleKnowledge = {

            // ---- BOOKS OF THE BIBLE ----
            books: {
                genesis: {
                    name: "Genesis",
                    summary: "The book of beginnings. It tells of the creation of the world, the fall of man, the flood, and the patriarchs: Abraham, Isaac, Jacob, and Joseph. Genesis reveals God's covenant promises and His plan for redemption through a chosen people.",
                    key_verses: "Genesis 1:1, 12:1-3, 50:20",
                    characters: "Adam, Eve, Noah, Abraham, Sarah, Isaac, Rebekah, Jacob, Rachel, Joseph, Judah",
                    events: "Creation, Fall, Flood, Tower of Babel, Abrahamic covenant, Sodom and Gomorrah, Isaac's birth, Jacob's ladder, Joseph sold into slavery, Israel goes to Egypt"
                },
                exodus: {
                    name: "Exodus",
                    summary: "The story of Israel's deliverance from slavery in Egypt through God's mighty hand. Moses leads the people out, the Red Sea is parted, and God gives the Law at Mount Sinai, including the Ten Commandments.",
                    key_verses: "Exodus 3:14, 12:13, 20:1-17",
                    characters: "Moses, Aaron, Pharaoh, Miriam, Joshua, Zipporah, Jethro",
                    events: "Burning bush, Ten plagues, Passover, Exodus from Egypt, Crossing the Red Sea, Manna from heaven, Ten Commandments, Golden calf, Tabernacle built"
                },
                leviticus: {
                    name: "Leviticus",
                    summary: "A manual of holiness for God's people. It contains laws about sacrifices, priesthood, purity, and festivals. The central message: 'Be holy, because I am holy.'",
                    key_verses: "Leviticus 11:45, 19:18, 26:12",
                    characters: "Moses, Aaron, the priests",
                    events: "Laws on sacrifices, Day of Atonement, Holiness code, Feasts of the Lord, Jubilee year"
                },
                numbers: {
                    name: "Numbers",
                    summary: "The story of Israel's wilderness wanderings. God's people fail to trust Him and wander for 40 years. The book records the census, laws, and the journey toward the Promised Land.",
                    key_verses: "Numbers 6:24-26, 14:18, 23:19",
                    characters: "Moses, Aaron, Miriam, Joshua, Caleb, Korah, Balaam",
                    events: "Census, Spies sent to Canaan, Rebellion of Korah, Bronze serpent, Balaam's donkey, Moses strikes the rock, Death of Aaron"
                },
                deuteronomy: {
                    name: "Deuteronomy",
                    summary: "Moses' farewell speeches to Israel before they enter the Promised Land. It is a renewal of the covenant, with laws and blessings for obedience and curses for disobedience.",
                    key_verses: "Deuteronomy 6:4-9, 7:9, 31:8",

                    characters: "Deborah, Gideon, Samson, Jephthah, Ehud, Barak, Samuel (last judge)",
                    events: "Cycle of sin and deliverance, Deborah and Barak defeat Sisera, Gideon's fleece, Samson's exploits, Jephthah's vow, The Levite's concubine"
                },
                ruth: {

                    characters: "Ruth, Naomi, Boaz, Orpah, Obed",

                },

                    key_verses: "2 Samuel 7:16, 22:31, 24:14",

                ezra: {

                },
                nehemiah: {
                    name: "Nehemiah",
                    summary: "The rebuilding of Jerusalem's walls under Nehemiah's leadership. The book combines prayer, perseverance, and practical faith in the face of opposition.",
                    key_verses: "Nehemiah 1:4, 8:10",

                },
                esther: {
                    name: "Esther",

                    characters: "Esther, Mordecai, Haman, Xerxes, Vashti",

                },
                job: {
                    name: "Job",
                    summary: "A profound exploration of suffering and God's sovereignty. Job, a righteous man, loses everything. He questions God but ultimately humbles himself before God's wisdom.",

                    characters: "Job, Eliphaz, Bildad, Zophar, Elihu, God, Satan",
                    events: "Job's prosperity, Testing of Job, Three friends' dialogues, Elihu's speech, God's response, Job's restoration"
                },
                psalms: {
                    name: "Psalms",
                    summary: "A collection of 150 songs and prayers expressing the full range of human emotion—praise, lament, thanksgiving, and trust. The Psalms point to God's character and His covenant love.",

                paul: {
                    name: "Paul",
                    description: "Originally Saul of Tarsus, a persecutor of the church. He was converted on the road to Damascus and became the apostle to the Gentiles. He wrote much of the New Testament and suffered greatly for the gospel.",
                    reference: "Acts 9, 13–28, Romans, Corinthians, Galatians, Ephesians, Philippians, Colossians, Timothy, Titus, Philemon"
                },
                john: {
                    name: "John",
                    description: "The beloved disciple, the author of the Gospel of John, the three epistles, and Revelation. He was a son of Zebedee, a brother of James, and one of Jesus' closest followers. He is known for his emphasis on love and his visions.",
                    reference: "John, 1 John, 2 John, 3 John, Revelation"
                },
                mary: {
                    name: "Mary",
                    description: "The mother of Jesus, a young virgin from Nazareth. She was chosen by God to bear the Messiah. She is honored as a faithful servant who said, 'May it be to me as you have said.'",
                    reference: "Matthew 1, Luke 1–2, John 2, Acts 1:14"
                },
                joseph: {
                    name: "Joseph (Old Testament)",
                    description: "The son of Jacob, sold into slavery by his brothers. He rose to power in Egypt, saved many from famine, and forgave his brothers. His story is a powerful picture of God's sovereignty and redemption.",
                    reference: "Genesis 37, 39–50, Acts 7:9-16"
                },
                josephnt: {
                    name: "Joseph (New Testament)",
                    description: "The husband of Mary, a righteous carpenter from Nazareth. He was a descendant of David and accepted God's plan for his family. He protected Jesus and Mary, and raised Jesus as his own son.",
                    reference: "Matthew 1–2, Luke 1–2"
                },
                esther: {
                    name: "Esther",
                    description: "A Jewish queen of Persia who risked her life to save her people from genocide. She courageously approached the king to expose Haman's plot. Her story shows God's providence and the power of faith.",
                    reference: "Esther (entire book)"
                },
                ruth: {
                    name: "Ruth",
                    description: "A Moabite widow who showed extraordinary loyalty to her mother-in-law Naomi. She married Boaz and became the great-grandmother of King David. She is included in the genealogy of Jesus.",
                    reference: "Ruth (entire book), Matthew 1:5"
                },
                samuel: {
                    name: "Samuel",
                    description: "The last judge and the first prophet of the monarchy. He anointed Saul and David as kings. He was dedicated to God by his mother Hannah and served as a faithful leader in Israel.",
                    reference: "1 Samuel 1–16, Acts 3:24"
                },
                ezra: {
                    name: "Ezra",
                    description: "A scribe and priest who led the second return from exile. He was devoted to the Law of God, taught the people, and led them in repentance and covenant renewal.",
                    reference: "Ezra 7–10, Nehemiah 8"
                },
                nehemiah: {
                    name: "Nehemiah",
                    description: "A cupbearer to King Artaxerxes who became the governor of Judah. He led the rebuilding of Jerusalem's walls in the face of opposition. He was a man of prayer, vision, and determination.",
                    reference: "Nehemiah (entire book)"
                },
                job: {
                    name: "Job",
                    description: "A righteous man who suffered greatly. He lost his children, his wealth, and his health. He questioned God but never cursed Him. In the end, God restored him, and Job understood that God's ways are beyond human comprehension.",
                    reference: "Job (entire book), James 5:11"
                },
                abigail: {
                    name: "Abigail",
                    description: "A wise and beautiful woman who prevented David from shedding innocent blood. She was married to Nabal, who foolishly refused David's request for food. After Nabal's death, she became David's wife.",
                    reference: "1 Samuel 25"
                },
                hannah: {
                    name: "Hannah",
                    description: "A devoted woman who prayed earnestly for a child. God gave her Samuel, and she dedicated him to the Lord. Her prayer is a model of faith and praise.",
                    reference: "1 Samuel 1–2"
                },
                gideon: {
                    name: "Gideon",
                    description: "A judge who delivered Israel from the Midianites with only 300 men. He doubted God's calling but eventually obeyed. He is listed in the hall of faith for his trust in God.",
                    reference: "Judges 6–8, Hebrews 11:32"
                },
                samson: {
                    name: "Samson",
                    description: "A judge of Israel known for his great strength, which came from his Nazirite vow. He fought against the Philistines but was betrayed by Delilah. His story shows that God can use flawed people for His purposes.",
                    reference: "Judges 13–16, Hebrews 11:32"
                },
                josiah: {
                    name: "Josiah",
                    description: "One of Judah's most righteous kings, who began a reform in the eighth year of his reign. He repaired the Temple and rediscovered the Book of the Law. He turned the nation back to God.",
                    reference: "2 Kings 22–23, 2 Chronicles 34–35"
                },
                hezekiah: {
                    name: "Hezekiah",
                    description: "A faithful king of Judah who trusted in God. He destroyed idols, purified the Temple, and led a great Passover celebration. God delivered him from the Assyrian army and extended his life by fifteen years.",
                    reference: "2 Kings 18–20, 2 Chronicles 29–32"
                },
                joash: {
                    name: "Joash",
                    description: "A king of Judah who was saved as an infant by his aunt Jehosheba. He repaired the Temple during his reign, but later turned away from God after the death of the priest Jehoiada.",
                    reference: "2 Kings 11–12, 2 Chronicles 22–24"
                },
                timothy: {
                    name: "Timothy",
                    description: "A young leader and Paul's companion in ministry. He was the son of a Jewish mother and a Greek father. Paul mentored him, and he became a pastor in Ephesus. Two of Paul's letters are addressed to him.",
                    reference: "Acts 16:1-3, 1 Timothy, 2 Timothy"
                },
                titus: {
                    name: "Titus",
                    description: "A Greek believer and Paul's trusted companion. He was a skilled leader who helped oversee the church in Crete. Paul's letter to Titus instructs him on church leadership and sound doctrine.",
                    reference: "2 Corinthians 8:16-24, Galatians 2:3, Titus"
                },
                barnabas: {
                    name: "Barnabas",
                    description: "A Levite from Cyprus, known as the 'son of encouragement.' He introduced Paul to the apostles, traveled with him on the first missionary journey, and later parted ways. He was a generous and supportive leader.",
                    reference: "Acts 4:36-37, 9:27, 11:22-26, 13–15"
                },
                stephen: {
                    name: "Stephen",
                    description: "The first Christian martyr. He was a man full of faith and the Holy Spirit, chosen to serve the church in Jerusalem. He boldly proclaimed Christ and was stoned to death, with Paul (then Saul) present.",
                    reference: "Acts 6–7"
                },
                philipphil: {
                    name: "Philip",
                    description: "One of the seven deacons and an evangelist. He preached in Samaria and baptized the Ethiopian eunuch. He was guided by the Spirit to share the gospel with those in need.",
                    reference: "Acts 6:1-6, 8:4-40"
                },
                johnbaptist: {
                    name: "John the Baptist",
                    description: "The forerunner of Jesus, who prepared the way for the Lord. He preached repentance and baptized in the Jordan River. He recognized Jesus as the Lamb of God and was later beheaded by Herod.",
                    reference: "Matthew 3, Mark 1, Luke 3, John 1:29-34"
                },
                pilate: {
                    name: "Pontius Pilate",
                    description: "The Roman governor of Judea who presided over the trial of Jesus. He found no fault in Jesus but allowed Him to be crucified to appease the crowd. He famously asked, 'What is truth?'",
                    reference: "Matthew 27, Mark 15, Luke 23, John 18–19"
                },
                herod: {
                    name: "Herod",
                    description: "Several kings named Herod are mentioned in the New Testament. Herod the Great tried to kill the infant Jesus. Herod Antipas beheaded John the Baptist and questioned Jesus. Herod Agrippa persecuted the early church.",
                    reference: "Matthew 2, Mark 6, Luke 13, Acts 12"
                },
                cain: {
                    name: "Cain",
                    description: "The firstborn son of Adam and Eve. He was a farmer who murdered his brother Abel out of jealousy because God accepted Abel's offering but not his. He was marked by God and became a wanderer.",
                    reference: "Genesis 4, Hebrews 11:4, 1 John 3:12"
                },
                abel: {
                    name: "Abel",
                    description: "The second son of Adam and Eve. He was a shepherd who offered an acceptable sacrifice to God. He was killed by his brother Cain. He is the first martyr and is commended for his faith.",
                    reference: "Genesis 4, Matthew 23:35, Hebrews 11:4"
                },
                enoch: {
                    name: "Enoch",
                    description: "A godly man who walked faithfully with God and did not die. He was taken by God, a rare instance of being spared from death. He is a model of faith and intimacy with God.",
                    reference: "Genesis 5:21-24, Hebrews 11:5, Jude 1:14"
                },
                melchizedek: {
                    name: "Melchizedek",
                    description: "The king of Salem and priest of God Most High who blessed Abraham. He is a type of Christ, a king-priest whose priesthood is eternal. Jesus is called a priest in the order of Melchizedek.",
                    reference: "Genesis 14:18-20, Psalm 110:4, Hebrews 7"
                },
                isaac: {
                    name: "Isaac",
                    description: "The son of Abraham and Sarah, born when they were old. He is the child of promise and the heir of the covenant. He was nearly sacrificed by Abraham but God provided a ram. He is the father of Jacob and Esau.",
                    reference: "Genesis 21–28, Romans 9:7-10"
                },
                jacob: {
                    name: "Jacob",
                    description: "The son of Isaac and Rebekah, and the younger twin of Esau. He was a deceiver but later became Israel, the father of the twelve tribes. He wrestled with God and was given the name Israel.",
                    reference: "Genesis 25–50, Romans 9:10-13"
                },
                josephot: {
                    name: "Joseph (son of Jacob)",
                    description: "The favorite son of Jacob who was sold into slavery by his brothers. He rose to power in Egypt, saved many during famine, and forgave his brothers. His story is a powerful picture of God's sovereignty and redemption.",
                    reference: "Genesis 37, 39–50, Acts 7:9-16"
                },
                aaron: {
                    name: "Aaron",
                    description: "The brother of Moses, appointed as the first high priest of Israel. He spoke for Moses and helped lead the people. He was involved in the golden calf incident but was later restored. He is a key figure in the priestly line.",
                    reference: "Exodus 4–5, 28–29, Leviticus, Numbers, Hebrews 5:4"
                },
                joshuaot: {
                    name: "Joshua (son of Nun)",
                    description: "The successor of Moses who led Israel into the Promised Land. He was a faithful warrior and leader, known for the conquest of Canaan and the fall of Jericho. He encouraged the people to serve the Lord.",
                    reference: "Joshua (entire book), Deuteronomy 31, Hebrews 4:8"
                },
                caleb: {
                    name: "Caleb",
                    description: "One of the two faithful spies who trusted God when Israel refused to enter the Promised Land. He was 85 years old when he received his inheritance in Hebron, demonstrating his enduring faith.",
                    reference: "Numbers 13–14, Joshua 14–15"
                },
                rahab: {
                    name: "Rahab",
                    description: "A Gentile prostitute in Jericho who hid the Israelite spies and helped them escape. She is commended for her faith and is included in the genealogy of Jesus. She is a picture of God's grace to all peoples.",
                    reference: "Joshua 2, 6, Matthew 1:5, Hebrews 11:31, James 2:25"
                },
                deborah: {
                    name: "Deborah",
                    description: "A prophetess and judge of Israel who led the people with wisdom. She went to battle with Barak and celebrated the victory in a song. She is a model of leadership and faith in God.",
                    reference: "Judges 4–5"
                },
                gideonjudge: {
                    name: "Gideon",
                    description: "A judge who delivered Israel from the Midianites with only 300 men. He doubted God's calling but obeyed after receiving multiple signs. He is listed in the hall of faith for his trust in God.",
                    reference: "Judges 6–8, Hebrews 11:32"
                },
                samsonjudge: {
                    name: "Samson",
                    description: "A judge known for his supernatural strength, which came from his Nazirite vow. He fought the Philistines but was betrayed by Delilah. His final act was a prayer for strength to defeat his enemies.",
                    reference: "Judges 13–16, Hebrews 11:32"
                },
                saulking: {
                    name: "Saul (first king)",
                    description: "The first king of Israel, chosen by God and anointed by Samuel. He started well but disobeyed God and was rejected. He became jealous of David and pursued him relentlessly. He died in battle with the Philistines.",
                    reference: "1 Samuel 9–31"
                },
                jonathan: {
                    name: "Jonathan",
                    description: "The son of King Saul and a close friend of David. He loved David as his own brother and protected him from Saul's wrath. He is a model of loyalty and friendship.",
                    reference: "1 Samuel 13–20, 2 Samuel 1:17-27"
                },
                uriah: {
                    name: "Uriah",
                    description: "A Hittite soldier in David's army, the husband of Bathsheba. David arranged for him to be killed in battle to cover his sin with Bathsheba. His death was a grievous sin that brought judgment on David's house.",
                    reference: "2 Samuel 11–12"
                },
                nathan: {
                    name: "Nathan",
                    description: "A prophet who confronted David about his sin with Bathsheba. He told the parable of the poor man's lamb and declared God's judgment on David. He also prophesied that Solomon would build the Temple.",
                    reference: "2 Samuel 7, 12, 1 Kings 1"
                },
                absalom: {
                    name: "Absalom",
                    description: "The third son of David, who rebelled against him and tried to take the throne. He was handsome but prideful. He died during the rebellion, and David grieved for him deeply.",
                    reference: "2 Samuel 13–18"
                },
                elisha: {
                    name: "Elisha",
                    description: "The successor of Elijah, a prophet who performed many miracles. He received a double portion of Elijah's spirit. He healed Naaman, raised the Shunammite's son, and warned Israel of enemy attacks.",
                    reference: "1 Kings 19, 2 Kings 2–13"
                },
                naaman: {
                    name: "Naaman",
                    description: "A commander of the army of Aram who was a leper. He was healed by Elisha after bathing in the Jordan River seven times. He acknowledged the God of Israel as the only true God.",
                    reference: "2 Kings 5, Luke 4:27"
                },
                jesabel: {
                    name: "Jezebel",
                    description: "A Phoenician princess who married King Ahab and led Israel into idolatry. She was a wicked queen who killed the prophets of the Lord and opposed Elijah. She met a violent death as prophesied.",
                    reference: "1 Kings 16–21, 2 Kings 9"
                },
                athaliah: {
                    name: "Athaliah",
                    description: "The daughter of Ahab and Jezebel, who became queen of Judah. She killed the royal family but was overthrown by the priest Jehoiada. She was an evil ruler who worshiped Baal.",
                    reference: "2 Kings 11, 2 Chronicles 22–23"
                },
                zerubbabel: {
                    name: "Zerubbabel",
                    description: "A leader of the return from exile and the governor of Judah. He oversaw the rebuilding of the Temple. He is an ancestor of Jesus and is mentioned in the book of Haggai and Zechariah.",
                    reference: "Ezra 2–5, Haggai 1–2, Zechariah 4, Matthew 1:12"
                },
                zechariahprophet: {
                    name: "Zechariah (prophet)",
                    description: "A prophet who encouraged the rebuilding of the Temple. He had visions that pointed to the Messiah and the future restoration of Israel. His book is rich with apocalyptic imagery.",
                    reference: "Zechariah (entire book)"
                },
                malachiprophet: {
                    name: "Malachi (prophet)",
                    description: "The last Old Testament prophet. He called Israel to repent and warned of the coming day of the Lord. He also prophesied the coming of Elijah before the great and dreadful day of the Lord.",
                    reference: "Malachi (entire book)"
                }
            },

            // ---- KEY EVENTS ----
            events: {
                creation: {
                    name: "Creation",
                    description: "In the beginning, God created the heavens and the earth. He spoke everything into existence in six days and rested on the seventh. He created humanity in His own image to have dominion over the earth.",
                    reference: "Genesis 1–2, Psalm 33:6-9, John 1:1-3"
                },
                fall: {
                    name: "The Fall",
                    description: "Adam and Eve disobeyed God by eating from the tree of the knowledge of good and evil. Sin entered the world, bringing death and separation from God. God promised a Redeemer who would crush the serpent's head.",
                    reference: "Genesis 3, Romans 5:12-21, 1 Corinthians 15:21-22"
                },
                flood: {
                    name: "The Flood",
                    description: "God sent a great flood to judge the world because of its wickedness. Noah, a righteous man, built an ark and saved his family and pairs of animals. The flood demonstrates God's judgment and mercy.",
                    reference: "Genesis 6–9, Matthew 24:37-39, 1 Peter 3:20-21"
                },
                towerofbabel: {
                    name: "Tower of Babel",
                    description: "Humanity united in pride to build a tower to reach the heavens. God confused their language and scattered them across the earth. It explains the origin of diverse languages and nations.",
                    reference: "Genesis 11:1-9"
                },
                abrahamiccovenant: {
                    name: "Abrahamic Covenant",
                    description: "God called Abraham and promised to make him a great nation, to bless him, and to bless all peoples on earth through him. This is the foundational covenant of the Old Testament, confirmed through Isaac and Jacob.",
                    reference: "Genesis 12:1-3, 15:1-21, 17:1-22"
                },
                exodusfromegypt: {
                    name: "Exodus from Egypt",
                    description: "God delivered Israel from slavery in Egypt through mighty signs and wonders, including the ten plagues and the parting of the Red Sea. It is the central saving event of the Old Testament.",
                    reference: "Exodus 1–15, Deuteronomy 5:6-15, Psalm 105:26-45"
                },
                sinaicovenant: {
                    name: "Sinai Covenant / The Law",
                    description: "At Mount Sinai, God made a covenant with Israel and gave them the Law, including the Ten Commandments. It established Israel as a holy nation and a priestly kingdom.",
                    reference: "Exodus 19–24, Deuteronomy 5, 9:10"
                },
                conquestofcanaan: {
                    name: "Conquest of Canaan",
                    description: "Under Joshua's leadership, Israel entered and conquered the Promised Land. The fall of Jericho was the first major victory. God gave Israel the land, fulfilling His promise to Abraham.",
                    reference: "Joshua 1–12, Hebrews 4:8-11"
                },
                judgestime: {
                    name: "The Time of the Judges",
                    description: "A period of repeated cycles of sin, oppression, deliverance, and apostasy. God raised up judges to rescue Israel when they cried out. The book of Judges shows the need for a king.",
                    reference: "Judges 2:10-23, 21:25"
                },
                davidiccovenant: {
                    name: "Davidic Covenant",
                    description: "God promised David that his throne would be established forever and that a descendant would reign on it. This pointed to Jesus, the Son of David, who would reign eternally.",
                    reference: "2 Samuel 7:12-16, Psalm 89, Acts 2:29-36"
                },
                templebuilt: {
                    name: "Solomon's Temple Built",
                    description: "Solomon built the Temple in Jerusalem as a permanent dwelling place for God's presence. It was a magnificent structure that served as the center of worship for Israel.",
                    reference: "1 Kings 5–8, 2 Chronicles 2–7"
                },
                kingdomdivided: {
                    name: "Division of the Kingdom",
                    description: "After Solomon's reign, the kingdom split into two: Israel (north) and Judah (south). This was due to Solomon's sin and the rebellion of the people. The divided kingdom lasted until the exile.",
                    reference: "1 Kings 12, 2 Chronicles 10"
                },
                fallofisrael: {
                    name: "Fall of Israel (Northern Kingdom)",
                    description: "Israel was conquered by the Assyrian Empire in 722 BC. The people were taken into exile because of their persistent idolatry and rejection of God's prophets.",
                    reference: "2 Kings 17, Hosea 8:14"
                },
                fallofjudah: {
                    name: "Fall of Judah (Southern Kingdom)",
                    description: "Judah was conquered by Babylon in 586 BC. Jerusalem and the Temple were destroyed, and the people were taken into exile. This happened because of their unfaithfulness and idolatry.",
                    reference: "2 Kings 24–25, Jeremiah 39, 52, Lamentations"
                },
                exile: {
                    name: "The Exile",
                    description: "The Israelites were taken captive to Babylon for seventy years, as prophesied by Jeremiah. During this time, they learned to worship God without a temple and to trust in His faithfulness.",
                    reference: "2 Kings 25, Jeremiah 29, Ezekiel 1–24, Daniel 1"
                },
                returnfromexile: {
                    name: "Return from Exile",
                    description: "Under the Persian king Cyrus, the exiles were allowed to return to Jerusalem. They rebuilt the Temple and the walls of Jerusalem under the leadership of Zerubbabel, Ezra, and Nehemiah.",
                    reference: "Ezra 1–6, Nehemiah 1–6, Isaiah 44:28, Jeremiah 29:10"
                },
                birthofjesus: {
                    name: "Birth of Jesus",
                    description: "Jesus Christ was born of a virgin, Mary, in Bethlehem. His birth fulfilled Old Testament prophecies and was announced by angels to shepherds. He is the Messiah, the King of the Jews, and the Savior of the world.",
                    reference: "Matthew 1–2, Luke 1–2, John 1:14, Galatians 4:4-5"
                },
                ministryofjesus: {
                    name: "Ministry of Jesus",
                    description: "Jesus began His public ministry at about age 30. He taught, healed, performed miracles, and proclaimed the kingdom of God. He called disciples, and His message was one of love, repentance, and faith.",
                    reference: "Matthew 4–25, Mark 1–13, Luke 4–21, John 2–17"
                },
                crucifixion: {
                    name: "Crucifixion of Jesus",
                    description: "Jesus was arrested, tried, and crucified under Pontius Pilate. He died on the cross as a sacrifice for the sins of the world. His death was prophesied in Isaiah 53 and fulfilled all the Old Testament types.",
                    reference: "Matthew 26–27, Mark 14–15, Luke 22–23, John 18–19, Isaiah 53"
                },
                resurrection: {
                    name: "Resurrection of Jesus",
                    description: "Jesus rose from the dead on the third day, conquering death and sin. His resurrection is the foundation of the Christian faith. He appeared to many witnesses and ascended to the Father.",
                    reference: "Matthew 28, Mark 16, Luke 24, John 20, 1 Corinthians 15, Romans 6:4-11"
                },
                ascension: {
                    name: "Ascension of Jesus",
                    description: "Forty days after the resurrection, Jesus ascended to heaven from the Mount of Olives. He is seated at the right hand of God, interceding for believers and preparing a place for them.",
                    reference: "Mark 16:19, Luke 24:50-53, Acts 1:9-11, Ephesians 1:20-23"
                },
                pentecost: {
                    name: "Pentecost",
                    description: "The Holy Spirit descended on the disciples in power, as Jesus had promised. They began to speak in tongues, and Peter preached the gospel, leading to the conversion of 3,000 people. This was the birth of the church.",
                    reference: "Acts 2:1-47, Joel 2:28-29"
                },
                paulsconversion: {
                    name: "Conversion of Paul",
                    description: "Saul of Tarsus, a fierce persecutor of the church, was converted on the road to Damascus. He encountered the risen Jesus and was blind for three days. He became the apostle to the Gentiles.",
                    reference: "Acts 9:1-31, 22:1-21, 26:9-18, Galatians 1:11-24"
                },
                missionsjourneys: {
                    name: "Paul's Missionary Journeys",
                    description: "Paul traveled throughout the Roman Empire, planting churches, preaching the gospel, and training leaders. His journeys are recorded in Acts and his letters form much of the New Testament.",
                    reference: "Acts 13–28, Romans 15:19-24"
                },
                newcreation: {
                    name: "New Creation (Revelation)",
                    description: "The final vision of the Bible: a new heaven and a new earth where God dwells with His people. There will be no more death, sorrow, or pain. Christ will reign forever in glory.",
                    reference: "Revelation 21–22, Isaiah 65:17, 2 Peter 3:13"
                }
            },

            // ---- KEY TRUTHS / THEMES ----
            truths: {
                monotheism: {
                    name: "One True God",
                    description: "There is only one God, who is the Creator and Sustainer of all things. He is eternal, holy, just, loving, and sovereign. The Bible teaches that God is one, yet exists in three persons: Father, Son, and Holy Spirit.",
                    reference: "Deuteronomy 6:4, Isaiah 43:10-11, Mark 12:29, John 17:3, 2 Corinthians 13:14"
                },
                sin: {
                    name: "Sin and Its Consequences",
                    description: "All have sinned and fallen short of God's glory. Sin is rebellion against God and brings death, judgment, and separation from Him. The Bible teaches that we are all in need of a Savior.",
                    reference: "Genesis 3, Romans 3:23, 5:12, 6:23, Isaiah 59:2"
                },
                salvation: {
                    name: "Salvation by Grace through Faith",
                    description: "We are saved by God's grace, not by our works. Salvation is a free gift received through faith in Jesus Christ. He died for our sins and rose again, and whoever believes in Him will not perish but have eternal life.",
                    reference: "John 3:16, Ephesians 2:8-9, Romans 10:9-10, Titus 3:5"
                },
                jesuscentrality: {
                    name: "The Centrality of Christ",
                    description: "Jesus is the Son of God, the promised Messiah, and the only way to the Father. All of Scripture points to Him. He is fully God and fully man, and His life, death, and resurrection are the foundation of the Christian faith.",
                    reference: "John 14:6, Acts 4:12, Colossians 1:15-20, Hebrews 1:1-4"
                },
                love: {
                    name: "Love of God",
                    description: "God is love. His love is unconditional, covenantal, and sacrificial. He loved the world so much that He gave His Son. Believers are called to love God with all their heart and to love their neighbors as themselves.",
                    reference: "1 John 4:8, 16, John 3:16, Deuteronomy 6:5, Leviticus 19:18, Matthew 22:37-40"
                },
                hope: {
                    name: "The Hope of Eternal Life",
                    description: "Those who trust in Christ have the hope of eternal life. This hope is not wishful thinking but a sure confidence in God's promises. Jesus rose from the dead, guaranteeing that believers will also rise to eternal life.",
                    reference: "John 11:25-26, Romans 5:2-5, 8:24-25, 1 Peter 1:3-4"
                },
                holy: {
                    name: "Holiness and Obedience",
                    description: "God calls His people to be holy, as He is holy. Holiness is not about perfection but about living a life set apart for God, characterized by love, righteousness, and obedience to His commandments.",
                    reference: "Leviticus 11:44, 1 Peter 1:15-16, Romans 12:1-2, 1 Thessalonians 4:3"
                },
                kingdom: {
                    name: "The Kingdom of God",
                    description: "The Kingdom of God is God's rule and reign over all creation. Jesus came preaching the kingdom and invites all to enter it through repentance and faith. It is present now in the hearts of believers and will be fully realized in the future.",
                    reference: "Mark 1:15, Matthew 6:33, Luke 17:20-21, Romans 14:17, Revelation 21"
                },
                covenant: {
                    name: "God's Faithfulness to His Covenant",
                    description: "Throughout the Bible, God makes covenants with His people: with Noah, Abraham, Moses, David, and finally the New Covenant in Christ. God is faithful to His promises, and He never fails those who trust in Him.",
                    reference: "Genesis 9:8-17, 17:1-14, Exodus 19:5-6, 2 Samuel 7:12-16, Jeremiah 31:31-34, Luke 22:20"
                },
                resurrectionhope: {
                    name: "The Resurrection of the Dead",
                    description: "Christ's resurrection is the guarantee of the future resurrection of all believers. Those who have died in Christ will be raised with new, glorified bodies to live with Him forever.",
                    reference: "1 Corinthians 15:12-58, 1 Thessalonians 4:13-18, John 5:28-29, Revelation 20:4-6"
                }
            }
        };

        // ============================================================
        // CHAT LOGIC
        // ============================================================

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Back button
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // Send message
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.focus();

            // Show typing
            typingIndicator.classList.add('show');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Simulate thinking + respond
            setTimeout(() => {
                const reply = generateReply(text);
                typingIndicator.classList.remove('show');
                addMessage('bot', reply);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 500 + Math.random() * 400);
        }

        // Add message to chat
        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = `message ${type}`;

            const textSpan = document.createElement('div');
            textSpan.textContent = text;
            div.appendChild(textSpan);

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (type === 'bot') {
                meta.innerHTML = `<i class="fas fa-robot"></i> Bible AI · ${timeStr}`;
            } else {
                meta.innerHTML = `${timeStr} <i class="fas fa-user"></i>`;
            }
            div.appendChild(meta);

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ============================================================
        // GENERATE REPLY — smart search across knowledge base
        // ============================================================

        function generateReply(query) {
            const q = query.toLowerCase().trim();

            // Check for greetings
            if (/^(hi|hello|hey|greetings|good morning|good afternoon|good evening|howdy|sup|yo)/i.test(q) && q.length < 30) {
                return "👋 Hello! I'm your Bible AI assistant. Ask me anything about the Bible — books, characters, events, or truths. I'll respond based on Scripture. What would you like to know?";
            }

            // Check for thanks
            if (/thank|thanks|appreciate|grateful/i.test(q)) {
                return "🙏 You're welcome! It's a joy to share God's Word with you. Let me know if you have more questions about the Bible!";
            }

            // Collect all matching entries
            let matches = [];

            // Search books
            for (const [key, book] of Object.entries(bibleKnowledge.books)) {
                const score = getMatchScore(q, book.name + ' ' + book.summary + ' ' + book.key_verses + ' ' + book.characters +
                    ' ' + book.events);
                if (score > 0) {
                    matches.push({ type: '📖 Book', name: book.name, data: book, score: score, key: key });
                }
            }

            // Search characters
            for (const [key, char] of Object.entries(bibleKnowledge.characters)) {
                const score = getMatchScore(q, char.name + ' ' + char.description + ' ' + char.reference);
                if (score > 0) {
                    matches.push({ type: '👤 Character', name: char.name, data: char, score: score, key: key });
                }
            }

            // Search events
            for (const [key, ev] of Object.entries(bibleKnowledge.events)) {
                const score = getMatchScore(q, ev.name + ' ' + ev.description + ' ' + ev.reference);
                if (score > 0) {
                    matches.push({ type: '⚡ Event', name: ev.name, data: ev, score: score, key: key });
                }
            }

            // Search truths
            for (const [key, truth] of Object.entries(bibleKnowledge.truths)) {
                const score = getMatchScore(q, truth.name + ' ' + truth.description + ' ' + truth.reference);
                if (score > 0) {
                    matches.push({ type: '💡 Truth', name: truth.name, data: truth, score: score, key: key });
                }
            }

            // Sort by score (highest first)
            matches.sort((a, b) => b.score - a.score);

            // Take top matches (limit to avoid too long)
            const topMatches = matches.slice(0, 3);

            if (topMatches.length === 0) {
                return "I couldn't find a direct match for your question in my Bible knowledge base. 😔\n\nCould you rephrase or ask about a specific book, character, event, or truth? I cover Genesis through Revelation.\n\nTry asking: 'Who was Moses?', 'Tell me about the Exodus', or 'What does the Bible say about love?'";
            }

            // Build response
            let response = '';
            for (let i = 0; i < topMatches.length; i++) {
                const m = topMatches[i];
                if (i === 0) {
                    // Main response
                    if (m.type === '📖 Book') {
                        const b = m.data;
                        response += `📖 **${b.name}**\n${b.summary}\n\n`;
                        if (b.characters) response += `👤 Key characters: ${b.characters}\n`;
                        if (b.events) response += `⚡ Key events: ${b.events}\n`;
                        if (b.key_verses) response += `📜 Key verses: ${b.key_verses}\n`;
                    } else if (m.type === '👤 Character') {
                        const c = m.data;
                        response += `👤 **${c.name}**\n${c.description}\n\n📖 ${c.reference}\n`;
                    } else if (m.type === '⚡ Event') {
                        const e = m.data;
                        response += `⚡ **${e.name}**\n${e.description}\n\n📖 ${e.reference}\n`;
                    } else if (m.type === '💡 Truth') {
                        const t = m.data;
                        response += `💡 **${t.name}**\n${t.description}\n\n📖 ${t.reference}\n`;
                    }
                } else {
                    // Additional related matches
                    if (m.type === '📖 Book') {
                        response += `\n📖 Related book: **${m.name}** — ${m.data.summary.substring(0, 100)}...`;
                    } else if (m.type === '👤 Character') {
                        response += `\n👤 Related character: **${m.name}** — ${m.data.description.substring(0, 100)}...`;
                    } else if (m.type === '⚡ Event') {
                        response += `\n⚡ Related event: **${m.name}** — ${m.data.description.substring(0, 100)}...`;
                    } else if (m.type === '💡 Truth') {
                        response += `\n💡 Related truth: **${m.name}** — ${m.data.description.substring(0, 100)}...`;
                    }
                }
            }

            // Add a note about Scripture
            response += '\n\n📖 *“All Scripture is God-breathed and is useful for teaching, rebuking, correcting and training in righteousness” — 2 Timothy 3:16*';

            return response;
        }

        // Helper: get match score between query and text
        function getMatchScore(query, text) {
            const qWords = query.split(/\s+/).filter(w => w.length > 2);
            const tLower = text.toLowerCase();

            let score = 0;
            let exactMatch = false;

            // Check if query appears as a phrase in text
            if (tLower.includes(query)) {
                score += 50;
                exactMatch = true;
            }

            for (const word of qWords) {
                if (tLower.includes(word)) {
                    score += 10;
                }
                // Check for partial matches
                for (const tWord of tLower.split(/\s+/)) {
                    if (tWord.length > 3 && word.length > 3) {
                        if (tWord.includes(word) || word.includes(tWord)) {
                            score += 5;
                        }
                    }
                }
            }

            // Boost score for key terms
            const keyTerms = ['bible', 'god', 'jesus', 'lord', 'christ', 'spirit', 'kingdom', 'salvation', 'grace', 'faith',
                'love', 'hope', 'covenant', 'testament', 'gospel', 'prophet', 'apostle', 'disciple', 'temple', 'exile',
                'redemption', 'resurrection', 'cross', 'blood', 'sacrifice', 'miracle', 'parable', 'prayer', 'worship',
                'praise', 'glory', 'truth', 'wisdom', 'righteous', 'holy', 'sin', 'repent'
            ];
            for (const term of keyTerms) {
                if (query.includes(term) && tLower.includes(term)) {
                    score += 15;
                }
            }

            return score;
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // ============================================================
        // WELCOME MESSAGE
        // ============================================================

        function showWelcome() {
            const welcomeText =
                "👋 Welcome! I'm your Bible AI assistant.\n\nI can answer questions about any book of the Bible (Genesis to Revelation), characters, events, and truths according to Scripture.\n\nTry asking:\n• 'Tell me about the book of Romans'\n• 'Who was David?'\n• 'What happened at the Exodus?'\n• 'What does the Bible say about love?'\n• 'Explain the resurrection'\n\nI'm here to help you explore God's Word! 🙏";

            const div = document.createElement('div');
            div.className = 'message bot welcome-msg';

            const textSpan = document.createElement('div');
            textSpan.textContent = welcomeText;
            div.appendChild(textSpan);

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.innerHTML = `<i class="fas fa-robot"></i> Bible AI · now`;
            div.appendChild(meta);

            chatMessages.appendChild(div);
        }

        // ============================================================
        // INIT
        // ============================================================

        showWelcome();
        userInput.focus();

        console.log('📖 Bible Chat initialized');
        console.log('📚 Books loaded:', Object.keys(bibleKnowledge.books).length);
        console.log('👤 Characters loaded:', Object.keys(bibleKnowledge.characters).length);
        console.log('⚡ Events loaded:', Object.keys(bibleKnowledge.events).length);
        console.log('💡 Truths loaded:', Object.keys(bibleKnowledge.truths).length);
    </script>
</body>
</html>
