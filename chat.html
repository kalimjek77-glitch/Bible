<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Breezy · Complete Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #f2ede8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #2c241e;
            -webkit-tap-highlight-color: transparent;
        }
        .fullscreen {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 1.5rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            background: linear-gradient(160deg, #f7f2ec 0%, #e8e0d8 100%);
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .fullscreen::-webkit-scrollbar {
            width: 4px;
        }
        .fullscreen::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .fullscreen::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .fullscreen {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(218, 207, 196, 0.4);
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: wrap;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 250, 245, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid #d6c8bc;
            border-radius: 60px;
            padding: 0.6rem 1.4rem 0.6rem 1.2rem;
            font-size: 1rem;
            font-weight: 470;
            color: #332a23;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            flex-shrink: 0;
        }
        .back-btn:active {
            transform: scale(0.94);
            background: #d6c7bb;
        }
        .back-btn i {
            font-size: 1.1rem;
            color: #5e4d3f;
        }
        .header-center {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }
        .header-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-icons .icon-robot {
            font-size: 2rem;
            color: #6d8f7a;
        }
        .header-icons .icon-feather {
            font-size: 1.8rem;
            color: #8a7566;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #2b211b;
            white-space: nowrap;
        }
        .header h1 span {
            font-weight: 300;
            font-size: 0.7rem;
            background: rgba(210, 195, 182, 0.5);
            color: #2b211b;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            margin-left: 0.3rem;
        }
        .header-spacer {
            width: 80px;
            flex-shrink: 0;
        }
        @media (max-width: 480px) {
            .header {
                flex-wrap: nowrap;
                gap: 6px;
            }
            .back-btn {
                padding: 0.4rem 0.9rem 0.4rem 0.7rem;
                font-size: 0.8rem;
            }
            .back-btn i {
                font-size: 0.85rem;
            }
            .back-btn span {
                display: none;
            }
            .header-icons .icon-robot {
                font-size: 1.5rem;
            }
            .header-icons .icon-feather {
                font-size: 1.3rem;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .header h1 span {
                font-size: 0.55rem;
                padding: 0.05rem 0.5rem;
            }
            .header-spacer {
                width: 30px;
            }
        }
        @media (max-width: 380px) {
            .back-btn {
                padding: 0.3rem 0.6rem;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .header-icons .icon-robot {
                font-size: 1.2rem;
            }
            .header-icons .icon-feather {
                font-size: 1rem;
            }
            .header-spacer {
                width: 20px;
            }
        }
        @media (min-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .header-icons .icon-robot {
                font-size: 2.4rem;
            }
            .header-icons .icon-feather {
                font-size: 2.2rem;
            }
        }
        .subtitle {
            color: #5f5146;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            opacity: 0.8;
            padding: 0 0.5rem;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 1rem;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem 0.5rem 0.8rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 300px;
            max-height: 600px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .chat-messages {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 92%;
        }
        .message-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-wrapper.bot {
            align-self: flex-start;
        }
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(176, 154, 139, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1.5px solid rgba(214, 200, 188, 0.5);
        }
        .avatar i {
            font-size: 1.2rem;
            color: #3f342c;
        }
        .message-wrapper.user .avatar {
            background: rgba(109, 143, 122, 0.3);
            border-color: rgba(109, 143, 122, 0.3);
        }
        .message-wrapper.user .avatar i {
            color: #4a6b5c;
        }
        .message {
            padding: 1rem 1.4rem;
            border-radius: 24px;
            font-size: 1.05rem;
            line-height: 1.7;
            word-wrap: break-word;
            animation: msgFadeIn 0.35s ease forwards;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            flex: 1;
        }
        @keyframes msgFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-wrapper.user .message {
            align-self: flex-end;
            background: rgba(176, 154, 139, 0.35);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(176, 154, 139, 0.25);
            color: #2b211b;
            border-bottom-right-radius: 6px;
        }
        .message-wrapper.bot .message {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            color: #281f1a;
            border-bottom-left-radius: 6px;
        }
        .message .msg-meta {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message-wrapper.bot .msg-meta {
            color: #5f5146;
        }
        .message-wrapper.user .msg-meta {
            color: #5f5146;
            justify-content: flex-end;
        }
        .typing-indicator {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            padding: 0.8rem 1.4rem;
            display: none;
            gap: 6px;
            align-items: center;
            margin-left: 48px;
        }
        .typing-indicator.show {
            display: flex;
        }
        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #8a7566;
            border-radius: 50%;
            animation: typingDot 1.2s ease-in-out infinite;
        }
        .typing-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingDot {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-top: 0.8rem;
            border-top: 2px solid rgba(218, 207, 196, 0.3);
            flex-shrink: 0;
            margin-top: 0.2rem;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            min-width: 160px;
            padding: 0.9rem 1.4rem;
            border: 2px solid rgba(214, 200, 188, 0.5);
            border-radius: 60px;
            font-size: 1.05rem;
            font-family: inherit;
            color: #2b211b;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-area input:focus {
            border-color: #b09a8b;
            box-shadow: 0 0 0 4px rgba(176, 154, 139, 0.15);
        }
        .input-area input::placeholder {
            color: #8f7c6e;
            font-style: italic;
            opacity: 0.7;
        }
        .input-area .send-btn {
            background: rgba(176, 154, 139, 0.5);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(138, 117, 102, 0.3);
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 470;
            color: #fcf7f2;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        .input-area .send-btn:active {
            transform: scale(0.94);
            background: rgba(138, 117, 102, 0.6);
        }
        .input-area .send-btn i {
            font-size: 1.1rem;
        }
        .footer {
            flex-shrink: 0;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(160, 143, 128, 0.6);
            padding-top: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(220, 207, 196, 0.2);
        }
        .footer i {
            margin: 0 3px;
        }
        @media (max-width: 400px) {
            .fullscreen {
                padding: 1rem 0.8rem 1.5rem;
            }
            .message {
                font-size: 0.92rem;
                padding: 0.8rem 1rem;
            }
            .message-wrapper {
                max-width: 96%;
            }
            .input-area input {
                font-size: 0.92rem;
                padding: 0.7rem 1.2rem;
                min-width: 120px;
            }
            .input-area .send-btn {
                font-size: 0.9rem;
                padding: 0.7rem 1.2rem;
            }
            .chat-messages {
                max-height: 400px;
                min-height: 200px;
                padding: 0.4rem 0.2rem;
            }
            .subtitle {
                font-size: 0.8rem;
                margin-bottom: 0.8rem;
            }
            .avatar {
                width: 30px;
                height: 30px;
            }
            .avatar i {
                font-size: 0.9rem;
            }
            .typing-indicator {
                margin-left: 40px;
            }
        }
        @media (min-width: 600px) {
            .chat-messages {
                max-height: 700px;
                min-height: 400px;
            }
            .message-wrapper {
                max-width: 82%;
            }
            .message {
                font-size: 1.15rem;
                padding: 1.2rem 1.8rem;
            }
            .input-area input {
                font-size: 1.15rem;
                padding: 1rem 1.8rem;
            }
            .input-area .send-btn {
                font-size: 1.15rem;
                padding: 1rem 2.2rem;
            }
            .subtitle {
                font-size: 1.05rem;
            }
        }
        @media (min-width: 900px) {
            .fullscreen {
                padding: 2.5rem 4rem 3rem;
                max-width: 1100px;
                margin: 0 auto;
            }
            .chat-messages {
                max-height: 800px;
                min-height: 450px;
            }
            .message-wrapper {
                max-width: 75%;
            }
            .message {
                font-size: 1.2rem;
            }
        }
        .chat-messages {
            scroll-behavior: smooth;
        }

        /* --- QUESTION LIBRARY BUTTON --- */
        .library-btn {
            position: fixed;
            bottom: 110px;
            right: 24px;
            background: rgba(176, 154, 139, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #fcf7f2;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.25s ease;
            z-index: 50;
            -webkit-tap-highlight-color: transparent;
        }
        .library-btn:active {
            transform: scale(0.9);
            background: rgba(138, 117, 102, 0.9);
        }
        .library-btn i {
            pointer-events: none;
        }
        .library-btn .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #c47a7a;
            color: #fff;
            font-size: 0.55rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 30px;
            border: 2px solid #f2ede8;
        }
        @media (max-width: 480px) {
            .library-btn {
                width: 52px;
                height: 52px;
                font-size: 1.5rem;
                bottom: 100px;
                right: 16px;
            }
        }
        @media (min-width: 600px) {
            .library-btn {
                width: 68px;
                height: 68px;
                font-size: 2rem;
                bottom: 120px;
                right: 32px;
            }
        }

        /* --- MODAL OVERLAY --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 25, 22, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal {
            background: #f7f2ec;
            border-radius: 32px;
            max-width: 720px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.35s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            padding: 1.2rem 1.8rem;
            border-bottom: 2px solid rgba(218, 207, 196, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .modal-header h2 {
            font-size: 1.4rem;
            font-weight: 500;
            color: #2b211b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-header h2 i {
            color: #8a7566;
        }
        .modal-close {
            background: rgba(214, 200, 188, 0.4);
            border: none;
            border-radius: 60px;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            color: #332a23;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:active {
            transform: scale(0.9);
            background: rgba(176, 154, 139, 0.4);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.8rem 1.8rem;
            -webkit-overflow-scrolling: touch;
        }
        .modal-body::-webkit-scrollbar {
            width: 4px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .modal-body {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }

        /* --- CATEGORIES --- */
        .category-group {
            margin-bottom: 1.4rem;
        }
        .category-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4f3d31;
            padding: 0.5rem 0.2rem 0.4rem 0;
            border-bottom: 2px solid rgba(176, 154, 139, 0.25);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s;
        }
        .category-title:active {
            color: #8a7566;
        }
        .category-title i {
            font-size: 1rem;
            color: #8a7566;
            width: 24px;
            text-align: center;
        }
        .category-title .arrow {
            margin-left: auto;
            font-size: 0.8rem;
            transition: transform 0.3s ease;
            color: #b8a69a;
        }
        .category-title .arrow.open {
            transform: rotate(180deg);
        }
        .category-questions {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .category-questions.open {
            max-height: 2000px;
        }
        .question-chip {
            display: inline-block;
            background: rgba(255, 250, 245, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            margin: 0.3rem 0.3rem;
            font-size: 0.85rem;
            color: #332a23;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .question-chip:active {
            transform: scale(0.94);
            background: rgba(176, 154, 139, 0.25);
            border-color: #8a7566;
        }
        .question-chip i {
            font-size: 0.75rem;
            margin-right: 6px;
            color: #8a7566;
            opacity: 0.6;
        }
        .category-empty {
            color: #8f7c6e;
            font-style: italic;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
        }

        /* --- RESPONSIVE MODAL --- */
        @media (max-width: 480px) {
            .modal {
                max-width: 100%;
                max-height: 90vh;
                border-radius: 24px;
            }
            .modal-header {
                padding: 0.9rem 1.2rem;
            }
            .modal-header h2 {
                font-size: 1.2rem;
            }
            .modal-body {
                padding: 0.8rem 1rem 1.2rem;
            }
            .category-title {
                font-size: 0.95rem;
            }
            .question-chip {
                font-size: 0.75rem;
                padding: 0.35rem 0.9rem;
            }
            .library-btn {
                bottom: 100px;
                right: 16px;
                width: 52px;
                height: 52px;
                font-size: 1.4rem;
            }
        }
        @media (min-width: 600px) {
            .modal {
                max-width: 780px;
            }
            .question-chip {
                font-size: 0.9rem;
                padding: 0.6rem 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="fullscreen" id="app">
        <div class="header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i> <span>Back</span>
            </button>
            <div class="header-center">
                <div class="header-icons">
                    <i class="fas fa-robot icon-robot"></i>
                    <i class="fas fa-feather-alt icon-feather"></i>
                </div>
                <h1>Breezy <span>AI</span></h1>
            </div>
            <div class="header-spacer"></div>
        </div>
        <div class="subtitle">❤️ Thousands of answers — Ask anything or choose a question below.</div>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="typing-indicator" id="typingIndicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your question here…" autocomplete="off" />
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
        <div class="footer">
            <i class="fas fa-robot"></i> Breezy · Created with love by Jojo Kalim ❤️
        </div>
    </div>

    <!-- FLOATING QUESTION LIBRARY BUTTON -->

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const libraryBtn = document.getElementById('libraryBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalBody = document.getElementById('modalBody');

        // --- Back button ---
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // --- Send message ---
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) {
                addMessage('bot', "I'm here to listen. ❤️ What's on your mind today?");
                return;
            }
            addMessage('user', text);
            userInput.value = '';
            userInput.focus();
            typingIndicator.classList.add('show');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            setTimeout(() => {
                typingIndicator.classList.remove('show');
                const reply = generateReply(text);
                addMessage('bot', reply);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 500 + Math.random() * 400);
        }

        function addMessage(type, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${type}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = type === 'bot' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';
            wrapper.appendChild(avatar);

            const bubble = document.createElement('div');
            bubble.className = 'message';
            const textSpan = document.createElement('div');
            textSpan.style.whiteSpace = 'pre-wrap';
            textSpan.textContent = text;
            bubble.appendChild(textSpan);

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            meta.innerHTML = type === 'bot' ? `Breezy · ${timeStr}` : `${timeStr} · You`;
            bubble.appendChild(meta);

            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

                        "📖 **Isaiah 41:10** — 'So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.'",
                        "📖 **Philippians 4:13** — 'I can do all this through him who gives me strength.'",
                        "📖 **Jeremiah 29:11** — 'For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.'",
                        "📖 **John 14:27** — 'Peace I leave with you; my peace I give you. I do not give to you as the world gives. Do not let your hearts be troubled and do not be afraid.'",
                        "📖 **Romans 8:28** — 'And we know that in all things God works for the good of those who love him, who have been called according to his purpose.'",
                        "📖 **Psalm 23:4** — 'Even though I walk through the darkest valley, I will fear no evil, for you are with me; your rod and your staff, they comfort me.'",
                        "📖 **Joshua 1:9** — 'Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.'",
                        "📖 **2 Timothy 1:7** — 'For God has not given us a spirit of fear, but of power and of love and of a sound mind.'"
                    ];
                    return "Here's a verse for you:\n\n" + verses[Math.floor(Math.random() * verses.length)] +
                        "\n\nI hope this encourages you! 🙏";
                }

                // Score each knowledge base item
                let bestMatch = null;
                let bestScore = 0;

                for (const item of knowledgeBase) {
                    let score = 0;
                    for (const kw of item.keywords) {
                        if (kw === '') continue;
                        if (lower.includes(kw)) {
                            const regex = new RegExp('\\b' + kw.replace(/'/g, "\\'") + '\\b', 'i');
                            if (regex.test(lower)) {
                                score += 3;
                            } else {
                                score += 1;
                            }
                        }
                    }
                    for (const kw of item.keywords) {
                        if (kw === '') continue;
                        if (lower.includes('feel ' + kw) || lower.includes('feeling ' + kw) || lower.includes('am ' + kw)) {
                            score += 5;
                        }
                    }
                    if (score > bestScore) {
                        bestScore = score;
                        bestMatch = item;
                    }
                }

                if (bestMatch && bestScore >= 1) {
                    return bestMatch.reply;
                }

                const fallback = knowledgeBase[knowledgeBase.length - 1];
                return fallback.reply;

            } catch (error) {
                console.warn('Error generating reply:', error);
                return "I'm here for you. ❤️ Sometimes I don't have the perfect words, but God does. He loves you and He's listening. 🙏";
            }
        }

        // ============================================================
        // QUESTION LIBRARY MODAL
        // ============================================================

        function renderLibrary() {
            let html = '';
            for (const [category, questions] of Object.entries(questionLibrary)) {
                const catId = 'cat-' + category.replace(/[^a-zA-Z0-9]/g, '');
                html += `
                    <div class="category-group">
                        <div class="category-title" data-cat="${catId}">
                            ${category}
                            <span class="arrow" id="arrow-${catId}"><i class="fas fa-chevron-down"></i></span>
                        </div>
                        <div class="category-questions" id="${catId}">
                            ${questions.map(q => `<span class="question-chip"><i class="fas fa-comment"></i> ${q}</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            modalBody.innerHTML = html;

            // Toggle categories
            document.querySelectorAll('.category-title').forEach(title => {
                title.addEventListener('click', function() {
                    const catId = this.dataset.cat;
                    const panel = document.getElementById(catId);
                    const arrow = document.getElementById('arrow-' + catId);
                    panel.classList.toggle('open');
                    arrow.classList.toggle('open');
                });
            });

            // Click on question chip
            document.querySelectorAll('.question-chip').forEach(chip => {
                chip.addEventListener('click', function() {
                    const question = this.textContent.trim();
                    modalOverlay.classList.remove('active');
                    // Send the question as a user message
                    addMessage('user', question);
                    userInput.value = '';
                    typingIndicator.classList.add('show');
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    setTimeout(() => {
                        typingIndicator.classList.remove('show');
                        const reply = generateReply(question);
                        addMessage('bot', reply);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    }, 500 + Math.random() * 400);
                });
            });

            // Open first category by default
            const firstPanel = document.querySelector('.category-questions');
            if (firstPanel) {
                firstPanel.classList.add('open');
                const firstArrow = document.querySelector('.arrow');
                if (firstArrow) firstArrow.classList.add('open');
            }
        }

        // --- Modal controls ---
        libraryBtn.addEventListener('click', function() {
            modalOverlay.classList.add('active');
            renderLibrary();
        });

        modalClose.addEventListener('click', function() {
            modalOverlay.classList.remove('active');
        });

        modalOverlay.addEventListener('click', function(e) {
            if (e.target === this) modalOverlay.classList.remove('active');
        });

        // --- Event listeners ---
        sendBtn.addEventListener('click', function(e) {
            e.preventDefault();
            sendMessage();
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // --- Welcome ---
        function showWelcome() {
            const welcomeText =
                "Hi, I'm Breezy 🤖❤️ — your all-in-one support friend.\n\nWhatever you're going through — emotions, sin, love life, cheating, financial problems, health, loss, career, boredom, spiritual struggles, or just needing a Bible verse — I'm here to listen and encourage you.\n\n**Just ask anything.** Or tap the 📖 button below to browse thousands of questions. What's on your mind today? 🙏";

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot';
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';
            wrapper.appendChild(avatar);
            const bubble = document.createElement('div');
            bubble.className = 'message';
            const textSpan = document.createElement('div');
            textSpan.style.whiteSpace = 'pre-wrap';
            textSpan.textContent = welcomeText;
            bubble.appendChild(textSpan);
            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.innerHTML = `Breezy · now`;
            bubble.appendChild(meta);
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
        }

        // --- Init ---
        showWelcome();
        userInput.focus();

        console.log('❤️ Breezy loaded with ' + knowledgeBase.length + ' knowledge items.');
        console.log('📚 Question library has ' + Object.keys(questionLibrary).length + ' categories.');
    </script>
</body>
</html>
